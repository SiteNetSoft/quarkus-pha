# quarkus-pha extension config defaults.
#
# Shipped in the runtime jar as a low-ordinal (100) config source, so any
# consumer application.properties entry overrides these.
#
# Compress responses (HTML, CSS, JS, JSON, SVG). The component library serves
# multi-megabyte PatternFly stylesheets; gzip cuts them ~90% on the wire and
# is the single biggest page-weight lever for consumers of this extension.
quarkus.http.enable-compression=true
quarkus.http.compress-media-types=text/html,text/plain,text/xml,text/css,text/javascript,application/javascript,application/json,application/xml,image/svg+xml
