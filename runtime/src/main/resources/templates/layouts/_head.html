{! Shared <head> partial — included by all layout templates !}
<meta charset="UTF-8">
<title>{#insert title}{applicationName}{/insert}</title>
<meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="color-scheme" content="light dark">
<meta name="application-name" content="{applicationName}">

<script>
  (function() {
    var t = localStorage.getItem('pha-theme') || 'auto';
    var dark = t === 'dark' || (t === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
    if (dark) document.documentElement.classList.add('pf-v6-theme-dark');
    var c = localStorage.getItem('pha-contrast') || 'system';
    var hc = c === 'on' || (c === 'system' && window.matchMedia('(prefers-contrast: more)').matches);
    if (hc) document.documentElement.classList.add('pf-v6-theme-high-contrast');
  })();
</script>

<link rel="stylesheet" href="/web/vendor/patternfly/patternfly.css">
<link rel="stylesheet" href="/web/vendor/patternfly/patternfly-addons.css">

{#insert head}{/insert}

<script src="/web/js/utils/focus-trap.js"></script>
<script src="/web/vendor/alpine/alpine.min.js" defer></script>
<script src="/web/vendor/htmx/htmx.min.js"></script>
