      data-ouia-component-type="PF6/Content"
      data-ouia-safe="true"
      data-ouia-component-id="OUIA-Generated-Content-1"
      data-pf-content="true"
      class="pf-v6-c-content pf-m-editorial"
    >
      <div class="pf-v6-l-flex pf-m-align-items-center">
        <div>
          <h1
            data-ouia-component-type="PF6/Title"
            data-ouia-safe="true"
            data-ouia-component-id="OUIA-Generated-Title-1"

          >
            {applicationPageName}
          </h1>
        </div>
        <div><div class="pf-v6-l-flex pf-m-inline-flex"></div></div>
      </div>
      {#if applicationPageDescription??}

      <p>A <b>tree view</b> is a structure that displays data in a hierarchical view.</p>
    </div>
  </div>
</section>
