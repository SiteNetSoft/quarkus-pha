{! Infinite Scroll — HTMX sentinel-based auto-loading !}
{! Parameters: id, loadUrl !}
<div class="pha-c-htmx-sentinel"
     id="{id}"
     hx-get="{loadUrl}"
     hx-trigger="revealed"
     hx-swap="afterend">
  <span class="htmx-indicator" aria-hidden="true">
    <span class="pf-v6-c-spinner pf-m-md" role="progressbar" aria-label="Loading more items">
      <span class="pf-v6-c-spinner__clipper"></span>
      <span class="pf-v6-c-spinner__lead-ball"></span>
      <span class="pf-v6-c-spinner__tail-ball"></span>
    </span>
  </span>
</div>
