{! Infinite Scroll — HTMX sentinel-based auto-loading !} {! Required: loadUrl !} {! Optional: id — DOM id on the sentinel; omit unless something else references it. !}
<div class="pha-c-htmx-sentinel"{#if id??} id="{id}"{/if} hx-get="{loadUrl}" hx-trigger="revealed" hx-swap="afterend">
  <span class="htmx-indicator" aria-hidden="true">
    <span class="pf-v6-c-spinner pf-m-md" role="progressbar" aria-label="Loading more items">
      <span class="pf-v6-c-spinner__clipper"></span>
      <span class="pf-v6-c-spinner__lead-ball"></span>
      <span class="pf-v6-c-spinner__tail-ball"></span>
    </span>
  </span>
</div>
