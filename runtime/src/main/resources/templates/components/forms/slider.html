{! Slider — PatternFly v6 !} {! Parameters: id, value (optional, default 50), min (optional, default 0), max (optional,
default 100), disabled (optional) !}
<div
  class="pf-v6-c-slider{#if disabled??} pf-m-disabled{/if}"
  id="{id}"
  x-data="{ val: {#if value??}{value}{#else}50{/if} }"
  :style="'--pf-v6-c-slider--value: ' + val"
>
  <div class="pf-v6-c-slider__main">
    <div
      class="pf-v6-c-slider__rail"
      @click="if(!$el.closest('.pf-m-disabled')){ const rect = $el.getBoundingClientRect(); val = Math.round(((($event.clientX - rect.left) / rect.width) * ({#if max??}{max}{#else}100{/if} - {#if min??}{min}{#else}0{/if})) + {#if min??}{min}{#else}0{/if}); }"
    >
      <div class="pf-v6-c-slider__rail-track"></div>
    </div>
    <div
      class="pf-v6-c-slider__thumb"
      role="slider"
      tabindex="0"
      aria-label="{#if ariaLabel??}{ariaLabel}{#else}Value{/if}"
      aria-valuemin="{#if min??}{min}{#else}0{/if}"
      aria-valuemax="{#if max??}{max}{#else}100{/if}"
      aria-valuenow="{#if value??}{value}{#else}50{/if}"
      :aria-valuenow="val"
      :style="'left: ' + ((val - {#if min??}{min}{#else}0{/if}) / ({#if max??}{max}{#else}100{/if} - {#if min??}{min}{#else}0{/if}) * 100) + '%'"
    ></div>
    <div class="pf-v6-c-slider__value pf-m-floating" x-text="val"></div>
  </div>
</div>
