{! Radio — PatternFly v6 !}
{! Parameters: id, name, label, checked (optional), disabled (optional), description (optional), body (optional), standalone (optional) !}
{#if standalone??}
<div class="pf-v6-c-radio pf-m-standalone" id="{id}">
  <input class="pf-v6-c-radio__input" type="radio" id="{id}-field" name="{name}"{#if checked??} checked{/if}{#if disabled??} disabled{/if}>
</div>
{#else}
<div class="pf-v6-c-radio" id="{id}">
  <input class="pf-v6-c-radio__input" type="radio" id="{id}-field" name="{name}"{#if checked??} checked{/if}{#if disabled??} disabled{/if}>
  <label class="pf-v6-c-radio__label{#if disabled??} pf-m-disabled{/if}" for="{id}-field">{label}</label>
  {#if description??}<span class="pf-v6-c-radio__description">{description}</span>{/if}
  {#if body??}<span class="pf-v6-c-radio__body">{body}</span>{/if}
</div>
{/if}
