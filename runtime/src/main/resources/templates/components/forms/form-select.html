{! Form select — PatternFly v6 (uses form-control with select element) !}
{! Parameters: id, disabled (optional) !}
<span class="pf-v6-c-form-control" id="{id}">
  <select id="{id}-field" name="{id}"{#if disabled??} disabled{/if}>
    {#insert content}{/insert}
  </select>
  <span class="pf-v6-c-form-control__toggle-icon">
    {icons:svg('fa:caret-down').raw}
  </span>
</span>
