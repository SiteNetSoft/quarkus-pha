{! Switch — PatternFly v6 !}
{! Parameters: id, label (optional), checked (optional), disabled (optional), reversed (optional) !}
<label class="pf-v6-c-switch{#if reversed??} pf-m-reverse{/if}" id="{id}" for="{id}-field">
  <input class="pf-v6-c-switch__input" type="checkbox" id="{id}-field"{#if checked??} checked{/if}{#if disabled??} disabled{/if}>
  <span class="pf-v6-c-switch__toggle">
    <span class="pf-v6-c-switch__toggle-icon">
      <i class="fas fa-check" aria-hidden="true"></i>
    </span>
  </span>
  {#if label??}<span class="pf-v6-c-switch__label">{label}</span>{/if}
</label>
