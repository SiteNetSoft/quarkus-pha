{! Modal — PatternFly v6 (modal-box) !}
{! Parameters: id, titleText, size (optional: sm|md|lg), variant (optional: danger|warning|success|info) !}
<div class="pf-v6-c-backdrop" id="{id}-backdrop" x-data="{ open: false }" x-show="open" x-cloak @open-modal.window="if ($event.detail === '{id}') open = true" @keydown.escape.window="if (open) open = false" x-effect="if (open) PHA.trapFocus($el); else PHA.releaseFocus($el);">
  <div class="pf-v6-c-bullseye">
    <div class="pf-v6-c-modal-box{#if size??} pf-m-{size}{/if}{#if variant??} pf-m-{variant}{/if}" role="dialog" aria-modal="true" aria-labelledby="{id}-title">
      <div class="pf-v6-c-modal-box__close">
        <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Close" @click="open = false">
          {icons:svg('fa:times').raw}
        </button>
      </div>
      <header class="pf-v6-c-modal-box__header">
        <h1 class="pf-v6-c-modal-box__title" id="{id}-title">
          {#if variant??}<span class="pf-v6-c-modal-box__title-icon"><i class="{#if variant is 'danger'}fas fa-exclamation-circle{#else if variant is 'warning'}fas fa-exclamation-triangle{#else if variant is 'success'}fas fa-check-circle{#else}fas fa-info-circle{/if}" aria-hidden="true"></i></span>{/if}
          <span class="pf-v6-c-modal-box__title-text">{titleText}</span>
        </h1>
      </header>
      <div class="pf-v6-c-modal-box__body">
        {#insert body}{/insert}
      </div>
      <footer class="pf-v6-c-modal-box__footer">
        {#insert footer}{/insert}
      </footer>
    </div>
  </div>
</div>
