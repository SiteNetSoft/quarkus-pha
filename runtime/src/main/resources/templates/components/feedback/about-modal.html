{! About Modal — PatternFly v6 !}
{! Parameters: productName, brandImageSrc, brandImageAlt, backgroundImage (optional) !}
{! Blocks: content, strapline !}
<div x-data="{ open: false }"
     @open-about-modal.window="open = true"
     @keydown.escape.window="open = false">
  <div class="pf-v6-c-backdrop"
       x-show="open"
       x-transition.opacity
       style="display: none;">
    <div class="pf-v6-c-about-modal-box"
         role="dialog"
         aria-modal="true"
         aria-labelledby="about-modal-title"
         {#if backgroundImage??}style="--pf-v6-c-about-modal-box--BackgroundImage: url({backgroundImage})"{/if}>
      <div class="pf-v6-c-about-modal-box__brand">
        <img class="pf-v6-c-about-modal-box__brand-image"
             src="{brandImageSrc}"
             alt="{brandImageAlt}" />
      </div>
      <div class="pf-v6-c-about-modal-box__close">
        <button class="pf-v6-c-button pf-m-plain"
                type="button"
                aria-label="Close dialog"
                @click="open = false">
          <span class="pf-v6-c-button__icon">
            <svg viewBox="0 0 384 512" fill="currentColor" aria-hidden="true" width="1em" height="1em">
              <path d="M342.6 150.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192 210.7 86.6 105.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L146.7 256 41.4 361.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192 301.3l105.4 105.3c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.3 256l105.3-105.4z"/>
            </svg>
          </span>
        </button>
      </div>
      <div class="pf-v6-c-about-modal-box__header">
        <h1 class="pf-v6-c-title pf-m-4xl" id="about-modal-title">{productName}</h1>
      </div>
      <div class="pf-v6-c-about-modal-box__content">
        <div class="pf-v6-c-about-modal-box__body">
          {#insert content}{/insert}
        </div>
        <p class="pf-v6-c-about-modal-box__strapline">
          {#insert strapline}{/insert}
        </p>
      </div>
    </div>
  </div>
</div>
