{! Tooltip — PatternFly v6 !}
{! Parameters: id, text, position (optional: top|bottom|left|right) !}
<div class="pf-v6-c-tooltip{#if position??} pf-m-{position}{#else} pf-m-top{/if}" id="{id}" role="tooltip">
  <div class="pf-v6-c-tooltip__arrow"></div>
  <div class="pf-v6-c-tooltip__content">{text}</div>
</div>
