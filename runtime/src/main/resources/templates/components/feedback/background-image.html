{! Background Image — PatternFly v6 !}
{! Required: src !}
{! Optional: id — DOM id on the root; omit unless something else references the image. !}
{! Model mode: pass backgroundImage=<...model.BackgroundImage>. !}
{#if backgroundImage??}
<div class="pf-v6-c-background-image"{#if backgroundImage.id??} id="{backgroundImage.id}"{/if}
     style="--pf-v6-c-background-image--BackgroundImage: url({backgroundImage.src})"></div>
{#else}
<div class="pf-v6-c-background-image"{#if id??} id="{id}"{/if}
     style="--pf-v6-c-background-image--BackgroundImage: url({src})"></div>
{/if}
