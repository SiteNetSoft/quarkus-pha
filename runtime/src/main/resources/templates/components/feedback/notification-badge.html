{! Notification badge — PatternFly v6 !}
{! Optional: id — DOM id on the root; omit unless something else references the badge.
              variant (read | unread | attention — default read), count (visible number), ariaLabel !}
<button class="pf-v6-c-notification-badge pf-m-{#if variant??}{variant}{#else}read{/if}" type="button"{#if id??} id="{id}"{/if}{#if ariaLabel??} aria-label="{ariaLabel}"{/if}>
  <span class="pf-v6-c-notification-badge__icon">{icons:svg('fa:bell').raw}</span>
  {#if count??}<span class="pf-v6-c-notification-badge__count">{count}</span>{/if}
</button>
