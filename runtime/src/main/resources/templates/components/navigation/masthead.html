{! Masthead — PatternFly v6 !} {! Optional: id — DOM id on the root; omit unless something else references the masthead.
                                           displayStack (optional) !}
<header class="pf-v6-c-masthead{#if displayStack??} pf-m-display-stack{/if}"{#if id??} id="{id}"{/if}>
  <div class="pf-v6-c-masthead__main">
    {#insert toggle}{/insert}
    <div class="pf-v6-c-masthead__brand">{#insert brand}{/insert}</div>
  </div>
  <div class="pf-v6-c-masthead__content">{#insert content}{/insert}</div>
</header>
