{! Menu — PatternFly v6 !}
{! Optional: id — DOM id on the root; omit unless something else references the menu.
              plain (optional), scrollable (optional), ariaLabel (optional — labels the menu) !}
<div
  class="pf-v6-c-menu{#if plain??} pf-m-plain{/if}{#if scrollable??} pf-m-scrollable{/if}"
  {#if id??}id="{id}"{/if}
  x-data="{
  handleKeyNav(e) {
    var items = Array.from($el.querySelectorAll('[role=menuitem]'));
    var idx = items.indexOf(e.target);
    if (idx < 0) return;
    var next = -1;
    if (e.key === 'ArrowDown') next = (idx + 1) % items.length;
    else if (e.key === 'ArrowUp') next = (idx - 1 + items.length) % items.length;
    else if (e.key === 'Home') next = 0;
    else if (e.key === 'End') next = items.length - 1;
    if (next >= 0) { e.preventDefault(); items[next].focus(); }
  }
}"
>
  <div class="pf-v6-c-menu__content">
    <ul class="pf-v6-c-menu__list" role="menu"{#if ariaLabel??} aria-label="{ariaLabel}"{/if} @keydown="handleKeyNav($event)">
      {#insert content}{/insert}
    </ul>
  </div>
</div>
