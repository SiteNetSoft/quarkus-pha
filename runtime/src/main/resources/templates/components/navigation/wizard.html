{! Wizard — PatternFly v6 !} {! Optional: id — DOM id on the root; omit unless something else references the wizard.
                                          navLabel (optional) !} {! Slots: navItems, body, footer !}
<div class="pf-v6-c-wizard"{#if id??} id="{id}"{/if}>
  <div class="pf-v6-c-wizard__outer-wrap">
    <div class="pf-v6-c-wizard__inner-wrap">
      <nav class="pf-v6-c-wizard__nav" aria-label="{#if navLabel??}{navLabel}{#else}Steps{/if}">
        <ol class="pf-v6-c-wizard__nav-list">
          {#insert navItems}{/insert}
        </ol>
      </nav>
      <div class="pf-v6-c-wizard__main">
        <div class="pf-v6-c-wizard__main-body">{#insert body}{/insert}</div>
      </div>
    </div>
    <footer class="pf-v6-c-wizard__footer">{#insert footer}{/insert}</footer>
  </div>
</div>
