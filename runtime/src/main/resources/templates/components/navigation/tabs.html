{! Tabs — PatternFly v6 !}
{! Optional: id — DOM id on the root; omit unless something else references the tabs.
              box (optional), vertical (optional), filled (optional), ariaLabel (optional — labels the tablist) !}
<div
  class="pf-v6-c-tabs{#if box??} pf-m-box{/if}{#if vertical??} pf-m-vertical{/if}{#if filled??} pf-m-filled{/if}"
  {#if id??}id="{id}"{/if}
  x-data="{
  handleKeyNav(e) {
    var tabs = Array.from($el.querySelectorAll('[role=tab]'));
    var idx = tabs.indexOf(e.target);
    if (idx < 0) return;
    var next = -1;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next = (idx + 1) % tabs.length;
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') next = (idx - 1 + tabs.length) % tabs.length;
    else if (e.key === 'Home') next = 0;
    else if (e.key === 'End') next = tabs.length - 1;
    if (next >= 0) { e.preventDefault(); tabs[next].focus(); }
  }
}"
>
  <ul class="pf-v6-c-tabs__list" role="tablist"{#if ariaLabel??} aria-label="{ariaLabel}"{/if} @keydown="handleKeyNav($event)">
    {#insert content}{/insert}
  </ul>
</div>
