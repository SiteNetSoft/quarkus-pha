{! Theme Selector — PatternFly v6 menu-toggle + menu !}
{! Switches between Light, Dark, and Auto (system) themes !}
<div x-data="{
       open: false,
       theme: 'auto',
       init() {
         this.theme = localStorage.getItem('pha-theme') || 'auto';
         this.applyTheme();
         this._mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
         this._onMediaChange = () => { if (this.theme === 'auto') this.applyTheme(); };
         this._mediaQuery.addEventListener('change', this._onMediaChange);
       },
       destroy() {
         if (this._mediaQuery) this._mediaQuery.removeEventListener('change', this._onMediaChange);
       },
       setTheme(t) {
         this.theme = t;
         localStorage.setItem('pha-theme', t);
         this.applyTheme();
         this.open = false;
       },
       applyTheme() {
         var dark = this.theme === 'dark' ||
           (this.theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
         document.documentElement.classList.toggle('pf-v6-theme-dark', dark);
       }
     }"
     @click.outside="open = false"
     @keydown.escape.window="if (open) { open = false; $event.stopPropagation(); }"
     style="position: fixed; bottom: var(--pf-t--global--spacer--md); left: var(--pf-t--global--spacer--md); z-index: var(--pf-t--global--z-index--lg);">

  {! Toggle button !}
  <button class="pf-v6-c-menu-toggle"
          :class="{ 'pf-m-expanded': open }"
          type="button"
          :aria-expanded="open.toString()"
          @click="open = !open">
    <span class="pf-v6-c-menu-toggle__icon">
      <svg viewBox="0 0 512 512" fill="currentColor" aria-hidden="true" width="1em" height="1em">
        <path d="M375.7 19.7c-1.5-8-6.9-14.7-14.4-17.8s-16.1-2.2-22.8 2.4L256 61.1 173.5 4.2c-6.7-4.6-15.3-5.5-22.8-2.4s-12.9 9.8-14.4 17.8l-18.1 98.5L19.7 136.3c-8 1.5-14.7 6.9-17.8 14.4s-2.2 16.1 2.4 22.8L61.1 256 4.2 338.5c-4.6 6.7-5.5 15.3-2.4 22.8s9.8 12.9 17.8 14.4l98.5 18.1 18.1 98.5c1.5 8 6.9 14.7 14.4 17.8s16.1 2.2 22.8-2.4L256 450.9l82.5 56.9c6.7 4.6 15.3 5.5 22.8 2.4s12.9-9.8 14.4-17.8l18.1-98.5 98.5-18.1c8-1.5 14.7-6.9 17.8-14.4s2.2-16.1-2.4-22.8L450.9 256l56.9-82.5c4.6-6.7 5.5-15.3 2.4-22.8s-9.8-12.9-17.8-14.4l-98.5-18.1L375.7 19.7zM269.6 110l65.6-45.2 14.4 78.3c1.8 9.8 9.5 17.5 19.3 19.3l78.3 14.4L402 242.4c-5.7 8.2-5.7 19 0 27.2l45.2 65.6-78.3 14.4c-9.8 1.8-17.5 9.5-19.3 19.3l-14.4 78.3L269.6 402c-8.2-5.7-19-5.7-27.2 0l-65.6 45.2-14.4-78.3c-1.8-9.8-9.5-17.5-19.3-19.3L64.8 335.2 110 269.6c5.7-8.2 5.7-19 0-27.2L64.8 176.8l78.3-14.4c9.8-1.8 17.5-9.5 19.3-19.3l14.4-78.3L242.4 110c8.2 5.7 19 5.7 27.2 0zM256 368a112 112 0 1 0 0-224 112 112 0 1 0 0 224zM192 256a64 64 0 1 1 128 0 64 64 0 1 1-128 0z"/>
      </svg>
    </span>
    <span class="pf-v6-c-menu-toggle__text">Theme</span>
    <span class="pf-v6-c-menu-toggle__controls">
      <span class="pf-v6-c-menu-toggle__toggle-icon">
        <svg viewBox="0 0 320 512" fill="currentColor" aria-hidden="true" width="1em" height="1em">
          <path d="M137.4 374.6c12.5 12.5 32.8 12.5 45.3 0l128-128c9.2-9.2 11.9-22.9 6.9-34.9s-16.6-19.8-29.6-19.8L32 192c-12.9 0-24.6 7.8-29.6 19.8s-2.2 25.7 6.9 34.9l128 128z"/>
        </svg>
      </span>
    </span>
  </button>

  {! Dropdown menu — opens upward since toggle is at bottom !}
  <div class="pf-v6-c-menu" x-show="open" x-transition style="display: none; position: absolute; left: 0; bottom: 100%;">
    <div class="pf-v6-c-menu__content">
      <ul class="pf-v6-c-menu__list" role="menu">
        <li class="pf-v6-c-menu__list-item" role="none">
          <button class="pf-v6-c-menu__item" :class="{ 'pf-m-selected': theme === 'light' }" type="button" role="menuitem" @click="setTheme('light')">
            <span class="pf-v6-c-menu__item-main">
              <span class="pf-v6-c-menu__item-text">Light</span>
              <span class="pf-v6-c-menu__item-select-icon">
                <svg viewBox="0 0 512 512" fill="currentColor" aria-hidden="true" width="1em" height="1em">
                  <path d="M173.9 439.4l-166.4-166.4c-10-10-10-26.2 0-36.2l36.2-36.2c10-10 26.2-10 36.2 0L192 312.7 432.1 72.6c10-10 26.2-10 36.2 0l36.2 36.2c10 10 10 26.2 0 36.2l-294.4 294.4c-10 10-26.2 10-36.2 0z"/>
                </svg>
              </span>
            </span>
          </button>
        </li>
        <li class="pf-v6-c-menu__list-item" role="none">
          <button class="pf-v6-c-menu__item" :class="{ 'pf-m-selected': theme === 'dark' }" type="button" role="menuitem" @click="setTheme('dark')">
            <span class="pf-v6-c-menu__item-main">
              <span class="pf-v6-c-menu__item-text">Dark</span>
              <span class="pf-v6-c-menu__item-select-icon">
                <svg viewBox="0 0 512 512" fill="currentColor" aria-hidden="true" width="1em" height="1em">
                  <path d="M173.9 439.4l-166.4-166.4c-10-10-10-26.2 0-36.2l36.2-36.2c10-10 26.2-10 36.2 0L192 312.7 432.1 72.6c10-10 26.2-10 36.2 0l36.2 36.2c10 10 10 26.2 0 36.2l-294.4 294.4c-10 10-26.2 10-36.2 0z"/>
                </svg>
              </span>
            </span>
          </button>
        </li>
        <li class="pf-v6-c-menu__list-item" role="none">
          <button class="pf-v6-c-menu__item" :class="{ 'pf-m-selected': theme === 'auto' }" type="button" role="menuitem" @click="setTheme('auto')">
            <span class="pf-v6-c-menu__item-main">
              <span class="pf-v6-c-menu__item-text">Auto</span>
              <span class="pf-v6-c-menu__item-select-icon">
                <svg viewBox="0 0 512 512" fill="currentColor" aria-hidden="true" width="1em" height="1em">
                  <path d="M173.9 439.4l-166.4-166.4c-10-10-10-26.2 0-36.2l36.2-36.2c10-10 26.2-10 36.2 0L192 312.7 432.1 72.6c10-10 26.2-10 36.2 0l36.2 36.2c10 10 10 26.2 0 36.2l-294.4 294.4c-10 10-26.2 10-36.2 0z"/>
                </svg>
              </span>
            </span>
          </button>
        </li>
      </ul>
    </div>
  </div>
</div>
