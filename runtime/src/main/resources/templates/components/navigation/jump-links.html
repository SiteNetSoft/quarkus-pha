{! Jump links — PatternFly v6 !} {! Optional: id — DOM id on the root; omit unless something else references the nav.
                                             vertical (optional), center (optional), ariaLabel (optional) !}
<nav
  class="pf-v6-c-jump-links{#if vertical??} pf-m-vertical{/if}{#if center??} pf-m-center{/if}"
  {#if id??}id="{id}"{/if}
  aria-label="{#if ariaLabel??}{ariaLabel}{#else}Jump to section{/if}"
>
  <ul class="pf-v6-c-jump-links__list">
    {#insert content}{/insert}
  </ul>
</nav>
