{! Navigation — PatternFly v6 (pf-v6-c-nav) !}
{! Parameters: id, horizontal (optional), ariaLabel (optional), currentPath (optional — marks active item) !}
<nav class="pf-v6-c-nav{#if horizontal??} pf-m-horizontal{/if}" id="{id}" aria-label="{#if ariaLabel??}{ariaLabel}{#else}Navigation{/if}"{#if currentPath??} data-current-path="{currentPath}"{/if}>
  <ul class="pf-v6-c-nav__list">
    {#insert content}{/insert}
  </ul>
</nav>
