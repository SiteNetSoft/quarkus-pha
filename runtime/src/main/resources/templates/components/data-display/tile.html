{! Tile — PatternFly v6 (Deprecated) !}
{! Parameters: id, title, iconName (optional, "set:slug"), bodyText (optional), selected (optional), disabled (optional) !}
<div class="pf-v6-c-tile{#if selected??} pf-m-selected{/if}{#if disabled??} pf-m-disabled{/if}" id="{id}" tabindex="0">
  <div class="pf-v6-c-tile__header">
    {#if iconName??}
    <div class="pf-v6-c-tile__icon">{icons:svg(iconName).raw}</div>
    {/if}
    <div class="pf-v6-c-tile__title">{title}</div>
  </div>
  {#if bodyText??}
  <div class="pf-v6-c-tile__body">{bodyText}</div>
  {/if}
</div>
