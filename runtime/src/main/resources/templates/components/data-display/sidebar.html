{! Sidebar — PatternFly v6 !} {! Optional: id — DOM id on the root; omit unless something else references the sidebar.
                                          panelRight (optional), gutter (optional), stack (optional) !}
<div
  class="pf-v6-c-sidebar{#if panelRight??} pf-m-panel-right{/if}{#if gutter??} pf-m-gutter{/if}{#if stack??} pf-m-stack{/if}"
  {#if id??}id="{id}"{/if}
>
  <div class="pf-v6-c-sidebar__main">
    <div class="pf-v6-c-sidebar__panel">{#insert panel}{/insert}</div>
    <div class="pf-v6-c-sidebar__content">{#insert content}{/insert}</div>
  </div>
</div>
