name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download frontend dependencies
        run: bash scripts/download-frontend-deps.sh

      - name: Build and run unit tests
        run: ./gradlew build
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-app
          path: integration-tests/build/quarkus-app/
          retention-days: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run linters
        run: bash scripts/lint.sh

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: quarkus-app
          path: integration-tests/build/quarkus-app/

      - name: Start Quarkus
        run: |
          java -jar integration-tests/build/quarkus-app/quarkus-run.jar &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "Quarkus is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Quarkus did not start within 30 seconds"
              exit 1
            fi
            sleep 1
          done

      - name: Run Playwright tests
        run: |
          cd integration-tests/e2e
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium
          npx playwright test
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: integration-tests/e2e/test-results/
          retention-days: 7

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: integration-tests/e2e/playwright-report/
          retention-days: 7
