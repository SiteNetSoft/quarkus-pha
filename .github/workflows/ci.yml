name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Prettier check
        run: bash scripts/format.sh --check

      - name: ESLint / Stylelint / HTMLHint
        run: bash scripts/lint.sh

  e2e:
    name: Full pipeline (e2e.sh)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Vendor frontend dependencies
        run: bash scripts/download-frontend-deps.sh

      - name: Run the canonical pipeline
        run: bash scripts/e2e.sh

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          include-hidden-files: true
          name: reports
          path: |
            .reports/
            integration-tests/e2e/playwright-report/
          retention-days: 7

      - name: Upload failure traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: integration-tests/e2e/test-results/
          retention-days: 7
