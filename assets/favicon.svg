<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Favicon variant of quarkus-pha-icon.svg: hexagon stroke thickened (26 -> 44) so the
       outline survives 16px rendering, and the stroke color follows the OS color scheme
       (favicons can't see the page theme class; prefers-color-scheme is the only signal). -->
  <style>
    .hex {
      stroke: #0d1c2c;
    }
    @media (prefers-color-scheme: dark) {
      .hex {
        stroke: #f2f6fa;
      }
    }
  </style>
  <!-- Hexagonal particle: Quarkus, the subatomic host -->
  <polygon class="hex" points="256,52 434,155 434,357 256,460 78,357 78,155"
           fill="none" stroke-width="44" stroke-linejoin="round"/>
  <!-- Three strata: PatternFly (base), HTMX (mid), Alpine snowcap (summit) -->
  <g stroke-linejoin="round" stroke-width="12">
    <path d="M 140 316 L 382 316 L 396 352 L 126 352 Z" fill="#0066CC" stroke="#0066CC"/>
    <path d="M 178 220 L 197 220 L 235 265 L 260 220 L 351 220 L 379 300 L 141 300 Z" fill="#4695EB" stroke="#4695EB"/>
    <path d="M 315 118 L 344 200 L 270 200 Z" fill="#7BC9DB" stroke="#7BC9DB"/>
  </g>
</svg>
