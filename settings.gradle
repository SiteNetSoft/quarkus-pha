pluginManagement {
    repositories {
        mavenCentral()
        gradlePluginPortal()
        mavenLocal()
    }
    plugins {
        id 'io.quarkus.extension' version "${quarkusPluginVersion}"
        id 'io.quarkus' version "${quarkusPluginVersion}"
    }
}

rootProject.name = 'quarkus-pha'

include 'runtime', 'deployment', 'integration-tests'
project(':runtime').name = 'quarkus-pha'
project(':deployment').name = 'quarkus-pha-deployment'
project(':integration-tests').name = 'quarkus-pha-integration-tests'
