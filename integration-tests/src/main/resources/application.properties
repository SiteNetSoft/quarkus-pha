quarkus.http.port=9090
# Bind on all interfaces so containers (e.g. Collabora Online) can reach
# the WOPI host endpoints via host.containers.internal.
quarkus.http.host=0.0.0.0

# document-editor showcase
# - collabora.url is the URL the browser uses to load the iframe
# - collabora.wopi-host is the WOPI base URL as seen from inside the
#   Collabora container (must be host-reachable, not "localhost")
collabora.url=http://localhost:9980
collabora.wopi-host=http://host.containers.internal:9090
collabora.access-token=demo-token

