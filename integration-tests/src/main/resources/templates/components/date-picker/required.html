<div x-data="{ v: '', touched: false }" style="max-width: 300px">
  <div class="pf-v6-c-date-picker" id="dp-required" x-data="{ open: false }" @pha-date-picked="v = $event.detail; open = false">
    <div class="pf-v6-c-date-picker__input">
      <div class="pf-v6-c-input-group">
        <div class="pf-v6-c-input-group__item pf-m-fill">
          <span class="pf-v6-c-form-control" :class="{ 'pf-m-error': touched && v === '' }">
            <input type="text" id="dp-required-field" x-model="v" @blur="touched = true" placeholder="YYYY-MM-DD" required aria-label="Required date" :aria-invalid="(touched && v === '').toString()" />
          </span>
        </div>
        <div class="pf-v6-c-input-group__item">
          <button class="pf-v6-c-button pf-m-control" type="button" aria-label="Toggle date picker" :aria-expanded="open.toString()" @click="open = !open"><span class="pf-v6-c-button__icon">{icons:svg('fa:calendar-alt').raw}</span></button>
        </div>
      </div>
    </div>
    <span id="dp-required-picked" hidden></span>
    <div class="pf-v6-c-date-picker__calendar" x-show="open" x-cloak @click.outside="open = false">
      {#include components/forms/calendar-month calendarMonth=dpCalRequired /}
    </div>
    <div class="pf-v6-c-date-picker__helper-text">
      <div class="pf-v6-c-helper-text" aria-live="polite">
        <div class="pf-v6-c-helper-text__item" x-show="!(touched && v === '')">
          <span class="pf-v6-c-helper-text__item-text">Date is required.</span>
        </div>
        <div class="pf-v6-c-helper-text__item pf-m-error" x-show="touched && v === ''" x-cloak>
          <span class="pf-v6-c-helper-text__item-icon">{icons:svg('fa:circle-exclamation').raw}</span>
          <span class="pf-v6-c-helper-text__item-text">A date must be provided.</span>
        </div>
      </div>
    </div>
  </div>
</div>
