<div x-data="{ }" style="max-width: 300px">
  <div class="pf-v6-c-date-picker" id="dp-american">
    <div class="pf-v6-c-date-picker__input">
      <div class="pf-v6-c-input-group">
        <div class="pf-v6-c-input-group__item pf-m-fill">
          <span class="pf-v6-c-form-control">
            <input type="text" id="dp-american-field" value="03/05/2026" placeholder="MM/DD/YYYY" aria-label="American format date" />
          </span>
        </div>
        <div class="pf-v6-c-input-group__item">
          <button class="pf-v6-c-button pf-m-control" type="button" aria-label="Toggle date picker">{icons:svg('fa:calendar-alt').raw}</button>
        </div>
      </div>
    </div>
    <div class="pf-v6-c-date-picker__helper-text">
      <div class="pf-v6-c-helper-text" aria-live="polite">
        <div class="pf-v6-c-helper-text__item">
          <span class="pf-v6-c-helper-text__item-text">MM/DD/YYYY</span>
        </div>
      </div>
    </div>
  </div>
</div>
