<div class="ws-preview-html" style="display: flex; align-items: center; gap: 2rem; flex-wrap: wrap">
  {#for i in demoIconsContainer}
  <div style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem">
    <span style="outline: 1px dashed var(--pf-t--global--border--color--brand--default, #06c); padding: 0.25rem">
      {#include components/icon iconModel=i /}
    </span>
    <code class="ws-code">size("3xl").iconSize("{i.iconSize}")</code>
  </div>
  {/for}
</div>
