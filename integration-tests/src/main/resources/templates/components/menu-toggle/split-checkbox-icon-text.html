{! Split toggle with checkbox, icon, and toggle text — the label lives inside the toggle
   button (pf-m-text) so clicking it triggers the toggle. !}
<div class="pf-v6-l-flex pf-m-space-items-md pf-m-align-items-center" id="mt-split-checkbox-icon-text-row">
  <div class="pf-v6-c-menu-toggle pf-m-split-button" id="mt-split-check-icon-text">
  <label class="pf-v6-c-check pf-m-standalone">
    <input class="pf-v6-c-check__input" type="checkbox" id="mt-split-check-icon-text-check" aria-label="Select all" />
  </label>
  <button class="pf-v6-c-menu-toggle__button pf-m-text" type="button" id="mt-split-check-icon-text-toggle-button" aria-expanded="false" aria-label="Menu toggle">
    <span class="pf-v6-c-menu-toggle__icon">{icons:svg('fa:gear').raw}</span>
    <span class="pf-v6-c-menu-toggle__text">Icon</span>
    <span class="pf-v6-c-menu-toggle__controls"><span class="pf-v6-c-menu-toggle__toggle-icon">{icons:svg('fa:caret-down').raw}</span></span>
  </button>
</div>
  <div class="pf-v6-c-menu-toggle pf-m-split-button pf-m-primary" id="mt-split-check-icon-text-primary">
  <label class="pf-v6-c-check pf-m-standalone">
    <input class="pf-v6-c-check__input" type="checkbox" id="mt-split-check-icon-text-primary-check" aria-label="Select all" />
  </label>
  <button class="pf-v6-c-menu-toggle__button pf-m-text" type="button" id="mt-split-check-icon-text-primary-toggle-button" aria-expanded="false" aria-label="Menu toggle">
    <span class="pf-v6-c-menu-toggle__icon">{icons:svg('fa:gear').raw}</span>
    <span class="pf-v6-c-menu-toggle__text">Icon</span>
    <span class="pf-v6-c-menu-toggle__controls"><span class="pf-v6-c-menu-toggle__toggle-icon">{icons:svg('fa:caret-down').raw}</span></span>
  </button>
</div>
  <div class="pf-v6-c-menu-toggle pf-m-split-button pf-m-secondary" id="mt-split-check-icon-text-secondary">
  <label class="pf-v6-c-check pf-m-standalone">
    <input class="pf-v6-c-check__input" type="checkbox" id="mt-split-check-icon-text-secondary-check" aria-label="Select all" />
  </label>
  <button class="pf-v6-c-menu-toggle__button pf-m-text" type="button" id="mt-split-check-icon-text-secondary-toggle-button" aria-expanded="false" aria-label="Menu toggle">
    <span class="pf-v6-c-menu-toggle__icon">{icons:svg('fa:gear').raw}</span>
    <span class="pf-v6-c-menu-toggle__text">Icon</span>
    <span class="pf-v6-c-menu-toggle__controls"><span class="pf-v6-c-menu-toggle__toggle-icon">{icons:svg('fa:caret-down').raw}</span></span>
  </button>
</div>
</div>
