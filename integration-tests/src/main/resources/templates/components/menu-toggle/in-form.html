<form class="pf-v6-c-form" style="max-width: 400px" @submit.prevent>
  <div class="pf-v6-c-form__group">
    <div class="pf-v6-c-form__group-label">
      <label class="pf-v6-c-form__label" for="mt-in-form"><span class="pf-v6-c-form__label-text">Owner</span></label>
    </div>
    <div class="pf-v6-c-form__group-control">
      <button class="pf-v6-c-menu-toggle pf-m-full-width" type="button" id="mt-in-form" aria-expanded="false"><span class="pf-v6-c-menu-toggle__text">Select an owner</span><span class="pf-v6-c-menu-toggle__controls"><span class="pf-v6-c-menu-toggle__toggle-icon">{icons:svg('fa:caret-down').raw}</span></span></button>
    </div>
  </div>
</form>
