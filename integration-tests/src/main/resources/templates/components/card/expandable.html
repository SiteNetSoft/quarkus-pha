<div style="max-width: 400px">
  <div class="pf-v6-c-card" id="cd-expandable" x-data="{ expanded: false }" :class="{ 'pf-m-expanded': expanded }">
    <div class="pf-v6-c-card__header">
      <div class="pf-v6-c-card__header-toggle">
        <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Details" :aria-expanded="expanded.toString()" @click="expanded = !expanded">
          <span class="pf-v6-c-button__icon"><span class="pf-v6-c-card__header-toggle-icon">{icons:svg('fa:angle-right').raw}</span></span>
        </button>
      </div>
      <div class="pf-v6-c-card__actions">
        <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Card actions"><span class="pf-v6-c-button__icon">{icons:svg('fa:ellipsis-vertical').raw}</span></button>
        <div class="pf-v6-c-check pf-m-standalone"><input class="pf-v6-c-check__input" type="checkbox" id="cd-expandable-check" aria-labelledby="cd-expandable-title"  /></div>
      </div>
      <div class="pf-v6-c-card__title" id="cd-expandable-title"><h2 class="pf-v6-c-card__title-text">Expandable card</h2></div>
    </div>
    <div class="pf-v6-c-card__expandable-content" x-show="expanded" x-cloak>
      <div class="pf-v6-c-card__body">The expandable content — hidden until the toggle is expanded.</div>
      <div class="pf-v6-c-card__footer">Footer</div>
    </div>
  </div>
</div>
