<div style="max-width: 400px">
  <div class="pf-v6-c-card" id="cd-header-without-title">
    <div class="pf-v6-c-card__header">
      <div class="pf-v6-c-card__actions">
        <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Card actions"><span class="pf-v6-c-button__icon">{icons:svg('fa:ellipsis-vertical').raw}</span></button>
        <div class="pf-v6-c-check pf-m-standalone"><input class="pf-v6-c-check__input" type="checkbox" id="cd-header-without-title-check" aria-labelledby="cd-header-without-title-title" aria-label="Select card" /></div>
      </div>
    </div>
    <div class="pf-v6-c-card__body">
      This is the card body. The header above carries only actions — no title element at all.
    </div>
  </div>
</div>
