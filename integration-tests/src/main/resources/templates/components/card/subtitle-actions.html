<div style="max-width: 400px">
  <div class="pf-v6-c-card" id="cd-subtitle-actions">
    <div class="pf-v6-c-card__header">
      <div class="pf-v6-c-card__actions">
        <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Card actions"><span class="pf-v6-c-button__icon">{icons:svg('fa:ellipsis-vertical').raw}</span></button>
        <div class="pf-v6-c-check pf-m-standalone"><input class="pf-v6-c-check__input" type="checkbox" id="cd-subtitle-actions-check" aria-labelledby="cd-subtitle-actions-title"  /></div>
      </div>
      <div class="pf-v6-c-card__header-main">
        <div class="pf-v6-c-card__title" id="cd-subtitle-actions-title"><h2 class="pf-v6-c-card__title-text">Card title</h2></div>
        <div class="pf-v6-c-card__subtitle">Card subtitle</div>
      </div>
    </div>
    <div class="pf-v6-c-card__body">Header actions (kebab + checkbox) pair with a title + subtitle in the header main area.</div>
    <div class="pf-v6-c-card__footer">Footer</div>
  </div>
</div>
