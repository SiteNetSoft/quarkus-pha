<div style="max-width: 460px">
  <div class="pf-v6-c-card" id="cd-title-inline-images-actions">
    <div class="pf-v6-c-card__header">
      <div class="pf-v6-c-card__actions">
        <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Card actions"><span class="pf-v6-c-button__icon">{icons:svg('fa:ellipsis-vertical').raw}</span></button>
        <div class="pf-v6-c-check pf-m-standalone"><input class="pf-v6-c-check__input" type="checkbox" id="cd-title-inline-images-actions-check" aria-labelledby="cd-title-inline-images-actions-title"  /></div>
      </div>
      <div class="pf-v6-c-card__header-main">
        <img class="pf-v6-c-brand" src="/web/images/quarkus-pha-icon.svg" alt="Quarkus PHA" style="--pf-v6-c-brand--Height: 32px" />
        <div class="pf-v6-c-card__title" id="cd-title-inline-images-actions-title">
          <h2 class="pf-v6-c-card__title-text">This title sits in the card head</h2>
        </div>
      </div>
    </div>
    <div class="pf-v6-c-card__body">Image and title share the header main area, inline with the actions.</div>
    <div class="pf-v6-c-card__footer">Footer</div>
  </div>
</div>
