<div style="max-width: 300px">
  <div class="pf-v6-c-card" id="cd-header-wraps">
    <div class="pf-v6-c-card__header pf-m-wrap">
      <div class="pf-v6-c-card__actions">
        <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Card actions"><span class="pf-v6-c-button__icon">{icons:svg('fa:ellipsis-vertical').raw}</span></button>
        <div class="pf-v6-c-check pf-m-standalone"><input class="pf-v6-c-check__input" type="checkbox" id="cd-header-wraps-check" aria-labelledby="cd-header-wraps-title"  /></div>
      </div>
      <div class="pf-v6-c-card__header-main">
        <div class="pf-v6-c-card__title" id="cd-header-wraps-title">
          <h2 class="pf-v6-c-card__title-text">This is a really really really really really really really really really really long header</h2>
        </div>
      </div>
    </div>
    <div class="pf-v6-c-card__body"><code>pf-m-wrap</code> on the header lets a long title wrap under the actions.</div>
  </div>
</div>
