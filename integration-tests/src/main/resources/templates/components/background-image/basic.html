<div
  class="ws-preview-html"
  style="
    position: relative;
    height: 280px;
    overflow: hidden;
    border-radius: var(--pf-t--global--border--radius--small, 4px);
    border: 1px solid var(--pf-t--global--border--color--default, #d2d2d2);
  "
>
  {#include components/feedback/background-image id="bg-image-basic" src="/web/images/pf-background.svg" /}
  <div style="position: relative; z-index: 1; padding: 2rem; color: var(--pf-t--global--text--color--regular, #151515)">
    <h3 style="margin: 0 0 0.5rem">Background image basic example</h3>
    <p style="margin: 0">
      The wrapper above is positioned and clipped so the fixed PF v6 background image sits behind any overlay content
      you stack on top.
    </p>
