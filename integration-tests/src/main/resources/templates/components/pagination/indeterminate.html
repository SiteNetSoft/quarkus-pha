<div class="pf-v6-c-pagination" id="pg-indeterminate">
  <div class="pf-v6-c-pagination__total-items"><b>1 - 10</b> of <b>many</b></div>
  <div class="pf-v6-c-pagination__nav" role="navigation" aria-label="Pagination">
    <div class="pf-v6-c-pagination__nav-control pf-m-first">
      <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Go to first page">
        <span class="pf-v6-c-button__icon">{icons:svg('fa:angles-left').raw}</span>
      </button>
    </div>
    <div class="pf-v6-c-pagination__nav-control pf-m-prev">
      <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Go to previous page">
        <span class="pf-v6-c-button__icon">{icons:svg('fa:angle-left').raw}</span>
      </button>
    </div>
    <div class="pf-v6-c-pagination__nav-page-select">
      <span aria-hidden="true">Page <b>1</b></span>
    </div>
    <div class="pf-v6-c-pagination__nav-control pf-m-next">
      <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Go to next page">
        <span class="pf-v6-c-button__icon">{icons:svg('fa:angle-right').raw}</span>
      </button>
    </div>
    <div class="pf-v6-c-pagination__nav-control pf-m-last">
      <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Go to last page" disabled>
        <span class="pf-v6-c-button__icon">{icons:svg('fa:angles-right').raw}</span>
      </button>
    </div>
  </div>
</div>
