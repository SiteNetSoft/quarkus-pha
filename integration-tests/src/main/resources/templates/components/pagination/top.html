{! Fully functional — Alpine tracks the page; the first/prev controls disable on page 1,
   next/last on the final page. !}
<div class="pf-v6-c-pagination" id="pg-top" x-data="{ page: 1 }">
  <div class="pf-v6-c-pagination__total-items"><b aria-hidden="true" x-text="(page - 1) * 10 + 1">1</b> - <b aria-hidden="true" x-text="page * 10">10</b> of <b>523</b></div>
  <div class="pf-v6-c-pagination__nav" role="navigation" aria-label="Pagination">
    <div class="pf-v6-c-pagination__nav-control pf-m-first">
      <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Go to first page" :disabled="page === 1" @click="page = 1">
        <span class="pf-v6-c-button__icon">{icons:svg('fa:angles-left').raw}</span>
      </button>
    </div>
    <div class="pf-v6-c-pagination__nav-control pf-m-prev">
      <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Go to previous page" :disabled="page === 1" @click="page--">
        <span class="pf-v6-c-button__icon">{icons:svg('fa:angle-left').raw}</span>
      </button>
    </div>
    <div class="pf-v6-c-pagination__nav-page-select">
      <span aria-hidden="true">Page <b x-text="page">1</b> of <b>53</b></span>
    </div>
    <div class="pf-v6-c-pagination__nav-control pf-m-next">
      <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Go to next page" :disabled="page === 53" @click="page++">
        <span class="pf-v6-c-button__icon">{icons:svg('fa:angle-right').raw}</span>
      </button>
    </div>
    <div class="pf-v6-c-pagination__nav-control pf-m-last">
      <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Go to last page" :disabled="page === 53" @click="page = 53">
        <span class="pf-v6-c-button__icon">{icons:svg('fa:angles-right').raw}</span>
      </button>
    </div>
  </div>
</div>
