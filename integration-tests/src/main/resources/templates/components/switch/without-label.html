{! No visible label — the input is named via aria-label only. !}
<label class="pf-v6-c-switch" id="sw-without-label" for="sw-without-label-field">
  <input class="pf-v6-c-switch__input" type="checkbox" id="sw-without-label-field" aria-label="Enable feature" checked />
  <span class="pf-v6-c-switch__toggle">
    <span class="pf-v6-c-switch__toggle-icon">{icons:svg('fa:check').raw}</span>
  </span>
</label>
