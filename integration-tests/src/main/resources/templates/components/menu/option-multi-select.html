<div x-data="{ sel: ['opt1'] }">
{#include components/navigation/menu id="mn-option-multi-select" attrs='style="max-width: 260px"'}
{#include components/navigation/menu-content}
{#include components/navigation/menu-list}
<li role="none" class="pf-v6-c-menu__list-item">
  <button class="pf-v6-c-menu__item" type="button" role="menuitemcheckbox" :class="{ 'pf-m-selected': sel.includes('opt1') }" aria-checked="false" :aria-checked="(sel.includes('opt1')).toString()" @click="sel.includes('opt1') ? sel = sel.filter(x => x !== 'opt1') : sel.push('opt1')">

      <span class="pf-v6-c-menu__item-text">Option 1</span>
      <span class="pf-v6-c-menu__item-select-icon" x-show="sel.includes('opt1')">{icons:svg('fa:check').raw}</span>
    </span>
  </button>
</li>
