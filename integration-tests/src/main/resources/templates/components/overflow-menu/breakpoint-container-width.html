{! Drag the container's resize handle — below 440px wide the buttons collapse
   into the kebab control (Alpine + ResizeObserver, mirroring PF's container breakpoint). !}
<div
  style="resize: horizontal; overflow: auto; border: 1px dashed var(--pf-t--global--border--color--default); padding: 1rem; min-width: 200px; max-width: 100%"
  x-data="{ narrow: false }"
  x-init="new ResizeObserver((entries) => { narrow = entries[0].contentRect.width < 440 }).observe($el)"
>
  {#include components/navigation/overflow-menu overflowMenu=demoOmBpWidth /}
</div>
