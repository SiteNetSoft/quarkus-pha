{! Vertical variant — below 220px of container height the stacked buttons
   collapse into the kebab. Drag the handle to resize. !}
<div
  style="resize: vertical; overflow: auto; border: 1px dashed var(--pf-t--global--border--color--default); padding: 1rem; height: 260px; min-height: 100px"
  x-data="{ narrow: false }"
  x-init="new ResizeObserver((entries) => { narrow = entries[0].contentRect.height < 220 }).observe($el)"
>
  {#include components/navigation/overflow-menu overflowMenu=demoOmBpHeight /}
</div>
