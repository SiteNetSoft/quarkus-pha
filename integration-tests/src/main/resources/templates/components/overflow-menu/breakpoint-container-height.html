{! Vertical variant — below 220px of container height the stacked buttons
   collapse into the kebab. Drag the handle to resize. !}
<div
  style="resize: vertical; overflow: auto; border: 1px dashed var(--pf-t--global--border--color--default); padding: 1rem; height: 260px; min-height: 100px"
  x-data="{ narrow: false }"
  x-init="new ResizeObserver((entries) => { narrow = entries[0].contentRect.height < 220 }).observe($el)"
>
  <div class="pf-v6-c-overflow-menu pf-m-vertical" id="om-breakpoint-height">
    <div class="pf-v6-c-overflow-menu__content" x-show="!narrow">
      <div class="pf-v6-c-overflow-menu__group pf-m-button-group">
        <div class="pf-v6-c-overflow-menu__item"><button class="pf-v6-c-button pf-m-primary" type="button"><span class="pf-v6-c-button__text">Primary</span></button></div>
        <div class="pf-v6-c-overflow-menu__item"><button class="pf-v6-c-button pf-m-secondary" type="button"><span class="pf-v6-c-button__text">Secondary</span></button></div>
        <div class="pf-v6-c-overflow-menu__item"><button class="pf-v6-c-button pf-m-tertiary" type="button"><span class="pf-v6-c-button__text">Tertiary</span></button></div>
      </div>
    </div>
    <div class="pf-v6-c-overflow-menu__control" x-show="narrow" x-cloak>
      <button class="pf-v6-c-menu-toggle pf-m-plain" type="button" aria-label="More actions">
        <span class="pf-v6-c-menu-toggle__icon">{icons:svg('fa:ellipsis-vertical').raw}</span>
      </button>
    </div>
  </div>
</div>
