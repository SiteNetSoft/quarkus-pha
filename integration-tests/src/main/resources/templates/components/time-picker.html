{#include layouts/base}
{#title}Time Picker{/title}
{#body}
<div style="padding: 2rem;">
  <a href="/" class="pf-v6-c-button pf-m-link pf-m-inline" style="margin-bottom: 1rem; display: inline-block;">&larr; Back to showcase</a>
  <h1>Time Picker</h1>
  <p>PatternFly v6 time picker component for selecting a time value.</p>

  <section style="margin-top: 2rem;">
    <h2 id="basic-heading">Basic</h2>
    <p>A basic time picker with a time input and clock icon button.</p>
    <div id="tp-basic">
      <div class="pf-v6-c-input-group">
        <div class="pf-v6-c-input-group__item pf-m-fill">
          <span class="pf-v6-c-form-control">
            <input type="time" value="12:00" aria-label="Time">
          </span>
        </div>
        <div class="pf-v6-c-input-group__item">
          <button class="pf-v6-c-button pf-m-control" type="button" aria-label="Toggle time picker">
            {icons:svg('fa:clock').raw}
          </button>
        </div>
      </div>
    </div>
  </section>
</div>
{/body}
{/include}
