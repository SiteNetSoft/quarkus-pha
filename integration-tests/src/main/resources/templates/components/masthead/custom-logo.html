<header class="pf-v6-c-masthead" id="mh-custom-logo">
  <div class="pf-v6-c-masthead__main">
    <span class="pf-v6-c-masthead__toggle">
      <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Global navigation">
        <span class="pf-v6-c-button__icon">{icons:svg('fa:bars').raw}</span>
      </button>
    </span>
    <div class="pf-v6-c-masthead__brand">
      {! The logo is rendered as a custom component — an <a> wrapping a brand image
         (here an inline SVG). Mirrors PF's "logo using custom component" example. !}
      <a class="pf-v6-c-masthead__logo" href="#" aria-label="PHA Showcase home">
        <svg width="132" height="36" viewBox="0 0 132 36" style="height: 36px" aria-hidden="true" focusable="false">
          <rect x="0" y="4" width="28" height="28" rx="6" fill="var(--pf-t--global--color--brand--default, #0066cc)" />
          <text x="14" y="24" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700" font-family="sans-serif">
            P
          </text>
          <text x="38" y="24" fill="currentColor" font-size="16" font-weight="700" font-family="sans-serif">
            PHA Showcase
          </text>
        </svg>
      </a>
    </div>
  </div>
  <div class="pf-v6-c-masthead__content">Content</div>
</header>
