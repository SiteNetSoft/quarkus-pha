<header
  class="pf-v6-c-masthead pf-m-inset-sm pf-m-inset-md-on-md pf-m-inset-lg-on-lg pf-m-inset-xl-on-xl"
  id="mh-insets"
  style="outline: 1px dashed var(--pf-t--global--border--color--default, #ccc)"
>
  <div class="pf-v6-c-masthead__main">
    <span class="pf-v6-c-masthead__toggle">
      <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Global navigation">
        <span class="pf-v6-c-button__icon">{icons:svg('fa:bars').raw}</span>
      </button>
    </span>
    <div class="pf-v6-c-masthead__brand"><a class="pf-v6-c-masthead__logo" href="#"><strong>PHA Showcase</strong></a></div>
  </div>
  <div class="pf-v6-c-masthead__content">
    Inset padding scales up with the breakpoint (sm → md → lg → xl). The dashed outline marks the masthead edge so the
    growing inset is visible.
  </div>
</header>
