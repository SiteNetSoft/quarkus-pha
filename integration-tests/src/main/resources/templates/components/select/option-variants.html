{! Option variants — descriptions, icons, disabled, and selected-with-check. !}
<div x-data="{ open: false, selected: 'Basic option' }" id="sl-option-variants" style="position: relative; display: inline-block">
  <button class="pf-v6-c-menu-toggle" type="button" :class="open ? 'pf-m-expanded' : ''" :aria-expanded="open" @click="open = !open" id="sl-option-variants-toggle">
    <span class="pf-v6-c-menu-toggle__text" x-text="selected"></span>
    <span class="pf-v6-c-menu-toggle__controls"><span class="pf-v6-c-menu-toggle__toggle-icon">{icons:svg('fa:caret-down').raw}</span></span>
  </button>
  <div class="pf-v6-c-menu" x-show="open" x-cloak @click.outside="open = false" style="position: absolute; top: 100%; left: 0; z-index: 200; min-width: 14rem">
    <div class="pf-v6-c-menu__content">
      <ul class="pf-v6-c-menu__list" role="listbox">
        <li role="none" class="pf-v6-c-menu__list-item" :class="selected === 'Basic option' ? 'pf-m-selected' : ''">
          <button class="pf-v6-c-menu__item" type="button" role="option" :aria-selected="selected === 'Basic option'" @click="selected = 'Basic option'; open = false">
            <span class="pf-v6-c-menu__item-main">
              <span class="pf-v6-c-menu__item-text">Basic option</span>
              <span class="pf-v6-c-menu__item-select-icon" x-show="selected === 'Basic option'">{icons:svg('fa:check').raw}</span>
            </span>
          </button>
        </li>
        <li role="none" class="pf-v6-c-menu__list-item" :class="selected === 'With description' ? 'pf-m-selected' : ''">
          <button class="pf-v6-c-menu__item" type="button" role="option" :aria-selected="selected === 'With description'" @click="selected = 'With description'; open = false">
            <span class="pf-v6-c-menu__item-main">
              <span class="pf-v6-c-menu__item-text">With description</span>
              <span class="pf-v6-c-menu__item-select-icon" x-show="selected === 'With description'">{icons:svg('fa:check').raw}</span>
              <span class="pf-v6-c-menu__item-description">A second line of descriptive text.</span>
            </span>
          </button>
        </li>
        <li role="none" class="pf-v6-c-menu__list-item" :class="selected === 'With icon' ? 'pf-m-selected' : ''">
          <button class="pf-v6-c-menu__item" type="button" role="option" :aria-selected="selected === 'With icon'" @click="selected = 'With icon'; open = false">
            <span class="pf-v6-c-menu__item-main">
              <span class="pf-v6-c-menu__item-icon">{icons:svg('fa:bell').raw}</span>
              <span class="pf-v6-c-menu__item-text">With icon</span>
              <span class="pf-v6-c-menu__item-select-icon" x-show="selected === 'With icon'">{icons:svg('fa:check').raw}</span>
            </span>
          </button>
        </li>
        <li role="none" class="pf-v6-c-menu__list-item">
          <button class="pf-v6-c-menu__item" type="button" role="option" disabled>
            <span class="pf-v6-c-menu__item-main"><span class="pf-v6-c-menu__item-text">Disabled option</span></span>
          </button>
        </li>
      </ul>
    </div>
  </div>
</div>
