{! Danger status until an option is chosen — mirrors PF's validated select. !}
<div x-data="{ open: false, selected: '' }" id="sl-validation" style="position: relative; display: inline-block">
  <button class="pf-v6-c-menu-toggle" type="button" :class="(open ? 'pf-m-expanded ' : '') + (selected === '' ? 'pf-m-danger' : 'pf-m-success')" :aria-expanded="open" @click="open = !open" id="sl-validation-toggle" aria-describedby="sl-validation-helper">
    <span class="pf-v6-c-menu-toggle__text" x-text="selected === '' ? 'Required: pick an option' : selected"></span>
    <span class="pf-v6-c-menu-toggle__controls">
      <span class="pf-v6-c-menu-toggle__status-icon" x-show="selected === ''">{icons:svg('fa:exclamation-circle').raw}</span>
      <span class="pf-v6-c-menu-toggle__status-icon" x-show="selected !== ''" x-cloak>{icons:svg('fa:circle-check').raw}</span>
      <span class="pf-v6-c-menu-toggle__toggle-icon">{icons:svg('fa:caret-down').raw}</span>
    </span>
  </button>
  <div class="pf-v6-c-menu" x-show="open" x-cloak @click.outside="open = false" style="position: absolute; top: 100%; left: 0; z-index: 200; min-width: 14rem">
    <div class="pf-v6-c-menu__content">
      <ul class="pf-v6-c-menu__list" role="listbox">
        <template x-for="opt in ['Alabama', 'Florida', 'New Jersey', 'New Mexico', 'New York', 'North Carolina']" :key="opt">
          <li role="none" class="pf-v6-c-menu__list-item" :class="selected === opt ? 'pf-m-selected' : ''">
            <button class="pf-v6-c-menu__item" type="button" role="option" :aria-selected="selected === opt" @click="selected = opt; open = false">
              <span class="pf-v6-c-menu__item-main"><span class="pf-v6-c-menu__item-text" x-text="opt"></span></span>
            </button>
          </li>
        </template>
      </ul>
    </div>
  </div>
  <div class="pf-v6-c-helper-text" id="sl-validation-helper" x-show="selected === ''">
    <div class="pf-v6-c-helper-text__item pf-m-error">
      <span class="pf-v6-c-helper-text__item-icon">{icons:svg('fa:circle-exclamation').raw}</span>
      <span class="pf-v6-c-helper-text__item-text">You must select a state.</span>
    </div>
  </div>
</div>
