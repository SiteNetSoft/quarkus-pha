<div
  x-data="{ open: false, q: '', opts: ['Alabama', 'Florida', 'New Jersey', 'New Mexico', 'New York', 'North Carolina'], chosen: [], toggleOpt(o) { this.chosen.indexOf(o) === -1 ? this.chosen.push(o) : this.chosen = this.chosen.filter((c) => c !== o); this.q = '' },
    matches() { return this.opts.filter((o) => o.toLowerCase().indexOf(this.q.toLowerCase()) !== -1) } }"
  id="sl-multi-typeahead"
  style="position: relative; max-width: 420px"
  @click.outside="open = false"
>
  <div class="pf-v6-c-menu-toggle pf-m-typeahead pf-m-full-width" :class="open ? 'pf-m-expanded' : ''" id="sl-multi-typeahead-toggle">
    <div class="pf-v6-c-text-input-group pf-m-plain">
          <div class="pf-v6-c-label-group" x-show="chosen.length > 0" style="align-self: center; padding-inline-start: 0.5rem">
            <div class="pf-v6-c-label-group__main">
              <ul class="pf-v6-c-label-group__list" role="list" aria-label="Selected states">
                <template x-for="c in chosen" :key="c">
                  <li class="pf-v6-c-label-group__list-item">
                    <span class="pf-v6-c-label pf-m-outline">
                      <span class="pf-v6-c-label__content"><span class="pf-v6-c-label__text" x-text="c"></span></span>
                      <span class="pf-v6-c-label__actions">
                        <button class="pf-v6-c-button pf-m-plain" type="button" :aria-label="'Remove ' + c" @click.stop="toggleOpt(c)">
                          <span class="pf-v6-c-button__icon">{icons:svg('fa:xmark').raw}</span>
                        </button>
                      </span>
                    </span>
                  </li>
                </template>
              </ul>
            </div>
          </div>
      <div class="pf-v6-c-text-input-group__main">
        <span class="pf-v6-c-text-input-group__text">
          <input class="pf-v6-c-text-input-group__text-input" type="text" id="sl-multi-typeahead-input" x-model="q" @focus="open = true" @input="open = true" placeholder="Select states" aria-label="Select states" role="combobox" :aria-expanded="open" />
        </span>
      </div>
    </div>
    <button class="pf-v6-c-menu-toggle__button" type="button" :aria-expanded="open" aria-label="Menu toggle" @click="open = !open">
      <span class="pf-v6-c-menu-toggle__controls"><span class="pf-v6-c-menu-toggle__toggle-icon">{icons:svg('fa:caret-down').raw}</span></span>
    </button>
  </div>
  <div class="pf-v6-c-menu" x-show="open" x-cloak style="position: absolute; top: 100%; left: 0; right: 0; z-index: 200">
    <div class="pf-v6-c-menu__content">
      <ul class="pf-v6-c-menu__list" role="listbox">
        <template x-for="opt in matches()" :key="opt">
          <li role="none" class="pf-v6-c-menu__list-item" :class="chosen.indexOf(opt) !== -1 ? 'pf-m-selected' : ''">
            <button class="pf-v6-c-menu__item" type="button" role="option" :aria-selected="chosen.indexOf(opt) !== -1" @click="toggleOpt(opt)">
              <span class="pf-v6-c-menu__item-main">
                <span class="pf-v6-c-menu__item-text" x-text="opt"></span>
                <span class="pf-v6-c-menu__item-select-icon" x-show="chosen.indexOf(opt) !== -1">{icons:svg('fa:check').raw}</span>
              </span>
            </button>
          </li>
        </template>
      </ul>
    </div>
  </div>
</div>
