{! Multi-select with checkbox menu items. !}
<div x-data="{ open: false, picked: ['Apple', 'Cherry'] }" style="position: relative; display: inline-block">
  <button class="pf-v6-c-menu-toggle" type="button" :class="open ? 'pf-m-expanded' : ''" :aria-expanded="open" @click="open = !open" id="sl-multi-toggle">
    <span class="pf-v6-c-menu-toggle__text" x-text="picked.length > 0 ? picked.length + ' selected' : 'Pick fruit'"></span>
    <span class="pf-v6-c-menu-toggle__controls"><span class="pf-v6-c-menu-toggle__toggle-icon">{icons:svg('fa:caret-down').raw}</span></span>
  </button>
  <div class="pf-v6-c-menu" x-show="open" x-cloak @click.outside="open = false" style="position: absolute; top: 100%; left: 0; z-index: 200; min-width: 14rem">
    <div class="pf-v6-c-menu__content">
      <ul class="pf-v6-c-menu__list" role="menu">
        <template x-for="opt in ['Apple', 'Banana', 'Cherry', 'Date']" :key="opt">
          <li role="none" class="pf-v6-c-menu__list-item"><button class="pf-v6-c-menu__item" type="button" role="menuitemcheckbox" :aria-checked="picked.includes(opt)" @click="picked.includes(opt) ? (picked = picked.filter(x => x !== opt)) : picked.push(opt)">
            <span class="pf-v6-c-menu__item-main">
              <span class="pf-v6-c-menu__item-check">
                <input type="checkbox" class="pf-v6-c-check__input" :checked="picked.includes(opt)" tabindex="-1" :aria-label="opt">
              </span>
              <span class="pf-v6-c-menu__item-text" x-text="opt"></span>
            </span>
          </button></li>
        </template>
      </ul>
    </div>
  </div>
</div>
