<div
  x-data="{ open: false, q: '', opts: ['Alabama', 'Florida', 'New Jersey', 'New Mexico', 'New York', 'North Carolina'], chosen: [], toggleOpt(o) { this.chosen.indexOf(o) === -1 ? this.chosen.push(o) : this.chosen = this.chosen.filter((c) => c !== o); this.q = '' },
    matches() { return this.opts.filter((o) => o.toLowerCase().indexOf(this.q.toLowerCase()) !== -1) } }"
  id="sl-multi-typeahead-checkbox"
  style="position: relative; max-width: 420px"
  @click.outside="open = false"
>
  <div class="pf-v6-c-menu-toggle pf-m-typeahead pf-m-full-width" :class="open ? 'pf-m-expanded' : ''" id="sl-multi-typeahead-checkbox-toggle">
    <div class="pf-v6-c-text-input-group pf-m-plain">
      <div class="pf-v6-c-text-input-group__main">
        <span class="pf-v6-c-text-input-group__text">
          <input class="pf-v6-c-text-input-group__text-input" type="text" id="sl-multi-typeahead-checkbox-input" x-model="q" @focus="open = true" @input="open = true" placeholder="Select states" aria-label="Select states" role="combobox" aria-expanded="false" :aria-expanded="open" />
        </span>
      </div>
    </div>
      <span class="pf-v6-c-menu-toggle__count" x-show="chosen.length > 0" style="align-self: center; margin-inline-end: 0.5rem">
        <span class="pf-v6-c-badge pf-m-unread" x-text="chosen.length"></span>
      </span>
    <button class="pf-v6-c-menu-toggle__button" type="button" :aria-expanded="open" aria-label="Menu toggle" @click="open = !open">
      <span class="pf-v6-c-menu-toggle__controls"><span class="pf-v6-c-menu-toggle__toggle-icon">{icons:svg('fa:caret-down').raw}</span></span>
    </button>
  </div>
  <div class="pf-v6-c-menu" x-show="open" x-cloak style="position: absolute; top: 100%; left: 0; right: 0; z-index: 200">
    <div class="pf-v6-c-menu__content">
      <ul class="pf-v6-c-menu__list" role="listbox">
        <template x-for="(opt, i) in matches()" :key="opt">
          <li role="none" class="pf-v6-c-menu__list-item">
            <label class="pf-v6-c-menu__item">
              <span class="pf-v6-c-menu__item-main">
                <span class="pf-v6-c-menu__item-check">
                  <div class="pf-v6-c-check pf-m-standalone">
                    <input class="pf-v6-c-check__input" type="checkbox" :aria-label="opt" :checked="chosen.indexOf(opt) !== -1" @change="toggleOpt(opt)" />
                  </div>
                </span>
                <span class="pf-v6-c-menu__item-text" x-text="opt"></span>
              </span>
            </label>
          </li>
        </template>
      </ul>
    </div>
  </div>
</div>
