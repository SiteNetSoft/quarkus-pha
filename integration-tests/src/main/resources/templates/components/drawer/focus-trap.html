<div
  class="pf-v6-c-drawer"
  id="dr-focus-trap"
  x-data="{ expanded: false }"
  :class="{ 'pf-m-expanded': expanded }"
  x-effect="if (expanded) { $nextTick(() => { PHA.trapFocus($refs.panel); $refs.focus.focus(); }); } else { PHA.releaseFocus($refs.panel); }"
  @keydown.escape="expanded = false"
  style="min-height: 240px"
>
  <div class="pf-v6-c-drawer__main">
    <div class="pf-v6-c-drawer__content">
      <div class="pf-v6-c-drawer__body pf-m-padding">
        <button
          class="pf-v6-c-button pf-m-primary"
          type="button"
          :aria-expanded="expanded.toString()"
          @click="expanded = !expanded"
        >
          <span class="pf-v6-c-button__text">Toggle drawer</span>
        </button>
        <p style="margin-top: 1rem">
          While the panel is open, Tab cycles only through the panel's focusable elements. Press Escape to close the
          panel and return focus to the page.
        </p>
      </div>
    </div>
    <div
      class="pf-v6-c-drawer__panel"
      x-ref="panel"
      role="dialog"
      aria-label="Drawer panel with trapped focus"
      x-show="expanded"
      x-cloak
      :aria-hidden="(!expanded).toString()"
    >
      <div class="pf-v6-c-drawer__head">
        <span :tabindex="expanded ? '0' : '-1'" x-ref="focus">Drawer panel header</span>
        <div class="pf-v6-c-drawer__actions">
          <div class="pf-v6-c-drawer__close">
            <button
              class="pf-v6-c-button pf-m-plain"
              type="button"
              aria-label="Close drawer panel"
              @click="expanded = false"
            >
              <span class="pf-v6-c-button__icon">{icons:svg('fa:xmark').raw}</span>
            </button>
          </div>
        </div>
      </div>
      <div class="pf-v6-c-drawer__body">
        <form class="pf-v6-c-form" @submit.prevent>
          <div class="pf-v6-c-form__group">
            <label class="pf-v6-c-form__label" for="dr-focus-trap-input">
              <span class="pf-v6-c-form__label-text">A focusable input</span>
            </label>
            <span class="pf-v6-c-form-control">
              <input type="text" id="dr-focus-trap-input" name="dr-focus-trap-input" />
            </span>
          </div>
          <div class="pf-v6-c-form__group">
            <button class="pf-v6-c-button pf-m-secondary" type="button">
              <span class="pf-v6-c-button__text">A focusable button</span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
