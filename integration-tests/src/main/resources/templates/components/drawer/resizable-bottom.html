<div
  class="pf-v6-c-drawer pf-m-panel-bottom"
  id="dr-resizable-bottom"
  x-data="phaDrawerResizable"
  data-position="bottom"
  data-default-size="200"
  data-min-size="100"
  :class="{ 'pf-m-expanded': expanded }"
  style="height: 320px"
>
  <div class="pf-v6-c-drawer__main">
    <div class="pf-v6-c-drawer__content">
      <div class="pf-v6-c-drawer__body pf-m-padding">
        <button
          class="pf-v6-c-button pf-m-primary"
          type="button"
          :aria-expanded="expanded.toString()"
          @click="expanded = !expanded"
        >
          <span class="pf-v6-c-button__text">Toggle drawer</span>
        </button>
        <p style="margin-top: 1rem">
          Resizable bottom panel — the splitter is horizontal, so resize with drag or the up/down arrow keys.
        </p>
      </div>
    </div>
    <div
      class="pf-v6-c-drawer__panel pf-m-resizable"
      x-ref="panel"
      x-show="expanded"
      x-cloak
      :aria-hidden="(!expanded).toString()"
    >
      <div
        class="pf-v6-c-drawer__splitter"
        x-ref="splitter"
        role="separator"
        tabindex="0"
        aria-orientation="horizontal"
        aria-label="Resize drawer panel"
        aria-valuenow="50"
        @pointerdown="startResize"
        @keydown="keyResize"
      >
        <div class="pf-v6-c-drawer__splitter-handle" aria-hidden="true"></div>
      </div>
      <div class="pf-v6-c-drawer__panel-main">
        <div class="pf-v6-c-drawer__head">
          <span>Drawer panel header</span>
          <div class="pf-v6-c-drawer__actions">
            <div class="pf-v6-c-drawer__close">
              <button
                class="pf-v6-c-button pf-m-plain"
                type="button"
                aria-label="Close drawer panel"
                @click="expanded = false"
              >
                <span class="pf-v6-c-button__icon">{icons:svg('fa:xmark').raw}</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
