<div class="pf-v6-c-drawer" id="dr-basic" x-data="{ expanded: false }" :class="{ 'pf-m-expanded': expanded }" :aria-expanded="expanded.toString()" style="min-height: 240px">
  <div class="pf-v6-c-drawer__main">
    <div class="pf-v6-c-drawer__content">
      <div class="pf-v6-c-drawer__body" style="padding: 1rem">
        <button class="pf-v6-c-button pf-m-primary" type="button" @click="expanded = !expanded">
          <span class="pf-v6-c-button__text" x-text="expanded ? 'Close drawer' : 'Open drawer'">Open drawer</span>
        </button>
        <p style="margin-top: 1rem">Main page content. Click the button to slide the drawer panel in from the right.</p>
      </div>
    </div>
    <div class="pf-v6-c-drawer__panel" x-show="expanded" x-cloak :aria-hidden="(!expanded).toString()" style="background: var(--pf-t--global--background--color--secondary--default)">
      <div class="pf-v6-c-drawer__body">
        <div class="pf-v6-c-drawer__head">
          <h2>Panel title</h2>
          <div class="pf-v6-c-drawer__actions">
            <div class="pf-v6-c-drawer__close">
              <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Close drawer panel" @click="expanded = false">
                <span class="pf-v6-c-button__icon">{icons:svg('fa:xmark').raw}</span>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="pf-v6-c-drawer__body" style="padding: 1rem">
        <p>Drawer panel content — details, edit form, related items.</p>
      </div>
    </div>
  </div>
</div>
