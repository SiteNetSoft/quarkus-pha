{! Click (or press Enter on) a tile to select it — exactly one stays selected. !}
<div class="pf-v6-l-flex pf-m-space-items-md" id="tile-single" x-data="{ sel: 1 }">
  <div class="pf-v6-c-tile" :class="{ 'pf-m-selected': sel === 1 }" tabindex="0" role="radio" aria-checked="true" :aria-checked="(sel === 1).toString()" @click="sel = 1" @keydown.enter="sel = 1">
    <div class="pf-v6-c-tile__header"><div class="pf-v6-c-tile__title">Tile one</div></div>
  </div>
  <div class="pf-v6-c-tile" :class="{ 'pf-m-selected': sel === 2 }" tabindex="0" role="radio" aria-checked="false" :aria-checked="(sel === 2).toString()" @click="sel = 2" @keydown.enter="sel = 2">
    <div class="pf-v6-c-tile__header"><div class="pf-v6-c-tile__title">Tile two</div></div>
  </div>
  <div class="pf-v6-c-tile" :class="{ 'pf-m-selected': sel === 3 }" tabindex="0" role="radio" aria-checked="false" :aria-checked="(sel === 3).toString()" @click="sel = 3" @keydown.enter="sel = 3">
    <div class="pf-v6-c-tile__header"><div class="pf-v6-c-tile__title">Tile three</div></div>
  </div>
</div>
