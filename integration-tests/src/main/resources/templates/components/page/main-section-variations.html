<div
  class="pf-v6-c-page"
  id="pg-main-section-variations"
  style="min-height: 420px; border: 1px solid var(--pf-t--global--border--color--default)"
>
  <header class="pf-v6-c-masthead">
    <div class="pf-v6-c-masthead__main">
      <div class="pf-v6-c-masthead__brand"><strong>Logo</strong></div>
    </div>
  </header>
  <div class="pf-v6-c-page__main-container">
    <div class="pf-v6-c-page__main" tabindex="-1">
      <div class="pf-v6-c-page__main-subnav" aria-label="With subnav type">
        Element with <code class="ws-code">pf-v6-c-page__main-subnav</code> for horizontal subnav navigation
      </div>
      <div class="pf-v6-c-page__main-tabs" aria-label="With tabs type">
        Element with <code class="ws-code">pf-v6-c-page__main-tabs</code> for tabs
      </div>
      <div class="pf-v6-c-page__main-breadcrumb" aria-label="With breadcrumb type">
        Element with <code class="ws-code">pf-v6-c-page__main-breadcrumb</code> for breadcrumbs
      </div>
      <section class="pf-v6-c-page__main-section" aria-label="With default type">
        <div class="pf-v6-c-page__main-body">
          Element with <code class="ws-code">pf-v6-c-page__main-section</code> for main content sections
        </div>
      </section>
      <div class="pf-v6-c-page__main-wizard" aria-label="With wizard type">
        Element with <code class="ws-code">pf-v6-c-page__main-wizard</code> for wizards
      </div>
    </div>
  </div>
</div>
