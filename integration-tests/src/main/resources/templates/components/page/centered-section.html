<div
  class="pf-v6-c-page"
  id="pg-centered-section"
  style="min-height: 320px; border: 1px solid var(--pf-t--global--border--color--default)"
>
  <header class="pf-v6-c-masthead">
    <div class="pf-v6-c-masthead__main">
      <div class="pf-v6-c-masthead__brand"><strong>Logo</strong></div>
    </div>
  </header>
  <div class="pf-v6-c-page__main-container">
    <div class="pf-v6-c-page__main" tabindex="-1">
      <section class="pf-v6-c-page__main-section pf-m-limit-width pf-m-align-center">
        <div class="pf-v6-c-page__main-body">
          <div class="pf-v6-c-card">
            <div class="pf-v6-c-card__body">
              When a width-limited page section is wider than the value of
              <code class="ws-code">--pf-v6-c-page--section--m-limit-width--MaxWidth</code>, the section is centered in
              the main area (<code class="ws-code">pf-m-limit-width pf-m-align-center</code>).
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>
