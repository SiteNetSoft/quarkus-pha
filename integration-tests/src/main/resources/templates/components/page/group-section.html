<div
  class="pf-v6-c-page"
  id="pg-group-section"
  style="min-height: 400px; border: 1px solid var(--pf-t--global--border--color--default)"
>
  <header class="pf-v6-c-masthead">
    <div class="pf-v6-c-masthead__main">
      <div class="pf-v6-c-masthead__brand"><strong>Logo</strong></div>
    </div>
  </header>
  <div class="pf-v6-c-page__main-container">
    <div class="pf-v6-c-page__main" tabindex="-1">
      <div class="pf-v6-c-page__main-group">
        <div class="pf-v6-c-page__main-breadcrumb">
          <nav class="pf-v6-c-breadcrumb" aria-label="Breadcrumb">
            <ol class="pf-v6-c-breadcrumb__list">
              <li class="pf-v6-c-breadcrumb__item">
                <a href="#" class="pf-v6-c-breadcrumb__link">Section home</a>
                <span class="pf-v6-c-breadcrumb__item-divider">{icons:svg('fa:angle-right').raw}</span>
              </li>
              <li class="pf-v6-c-breadcrumb__item">
                <a href="#" class="pf-v6-c-breadcrumb__link pf-m-current" aria-current="page">Section title</a>
              </li>
            </ol>
          </nav>
        </div>
        <section class="pf-v6-c-page__main-section">
          <div class="pf-v6-c-page__main-body">
            The breadcrumb and this section are wrapped in a single
            <code class="ws-code">pf-v6-c-page__main-group</code>, so they read as one visual unit.
          </div>
        </section>
      </div>
      <section class="pf-v6-c-page__main-section pf-m-secondary">
        <div class="pf-v6-c-page__main-body">A separate section outside the group.</div>
      </section>
    </div>
  </div>
</div>
