<div
  class="pf-v6-c-page"
  id="pg-dynamic-sticky-section"
  style="height: 360px; border: 1px solid var(--pf-t--global--border--color--default)"
>
  <header class="pf-v6-c-masthead">
    <div class="pf-v6-c-masthead__main">
      <div class="pf-v6-c-masthead__brand"><strong>Logo</strong></div>
    </div>
  </header>
  <div class="pf-v6-c-page__main-container">
    <div class="pf-v6-c-page__main" tabindex="0" style="overflow-y: auto">
      <section class="pf-v6-c-page__main-section pf-m-sticky-top pf-m-secondary">
        <div class="pf-v6-c-page__main-body">
          Sticky section (<code class="ws-code">pf-m-sticky-top</code>) — scroll the area below; this stays pinned.
          Height-based variants like <code class="ws-code">pf-m-sticky-top-on-lg-height</code> make it conditional.
        </div>
      </section>
      <section class="pf-v6-c-page__main-section">
        <div class="pf-v6-c-page__main-body">
          <p>Scrollable content 1</p>
          <p style="margin-top: 4rem">Scrollable content 2</p>
          <p style="margin-top: 4rem">Scrollable content 3</p>
          <p style="margin-top: 4rem">Scrollable content 4</p>
          <p style="margin-top: 4rem">Scrollable content 5</p>
          <p style="margin-top: 4rem">Scrollable content 6</p>
        </div>
      </section>
    </div>
  </div>
</div>
