<div
  class="pf-v6-c-page"
  id="pg-plain-sections"
  style="min-height: 480px; border: 1px solid var(--pf-t--global--border--color--default)"
>
  <header class="pf-v6-c-masthead">
    <div class="pf-v6-c-masthead__main">
      <div class="pf-v6-c-masthead__brand"><strong>Logo</strong></div>
    </div>
  </header>
  <div class="pf-v6-c-page__main-container">
    <div class="pf-v6-c-page__main" tabindex="-1">
      <section class="pf-v6-c-page__main-section pf-m-plain">
        <div class="pf-v6-c-page__main-body">
          Plain section — <code class="ws-code">pf-m-plain</code> removes the background color.
        </div>
      </section>
      <section class="pf-v6-c-page__main-section">
        <div class="pf-v6-c-page__main-body">Default section with the standard background.</div>
      </section>
      <div class="pf-v6-c-page__main-group pf-m-plain">
        <section class="pf-v6-c-page__main-section">
          <div class="pf-v6-c-page__main-body">
            Section inside a <code class="ws-code">pf-v6-c-page__main-group pf-m-plain</code>.
          </div>
        </section>
        <section class="pf-v6-c-page__main-section">
          <div class="pf-v6-c-page__main-body">Another section in the same plain group.</div>
        </section>
      </div>
      <section class="pf-v6-c-page__main-section pf-m-secondary">
        <div class="pf-v6-c-page__main-body">
          Secondary variant section (<code class="ws-code">pf-m-secondary</code>) for contrast.
        </div>
      </section>
    </div>
  </div>
</div>
