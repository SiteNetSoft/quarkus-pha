<div
  class="pf-v6-c-page"
  id="pg-filled-sections"
  style="min-height: 480px; border: 1px solid var(--pf-t--global--border--color--default)"
>
  <header class="pf-v6-c-masthead">
    <div class="pf-v6-c-masthead__main">
      <div class="pf-v6-c-masthead__brand"><strong>Logo</strong></div>
    </div>
  </header>
  <div class="pf-v6-c-page__main-container">
    <div class="pf-v6-c-page__main" tabindex="-1">
      <section class="pf-v6-c-page__main-section">
        <div class="pf-v6-c-page__main-body">Default fill behavior — the section sizes to its content.</div>
      </section>
      <section class="pf-v6-c-page__main-section pf-m-fill">
        <div class="pf-v6-c-page__main-body">
          <code class="ws-code">pf-m-fill</code> — this section grows to fill the available vertical space.
        </div>
      </section>
      <section class="pf-v6-c-page__main-section pf-m-no-fill">
        <div class="pf-v6-c-page__main-body">
          <code class="ws-code">pf-m-no-fill</code> — this section never grows beyond its content.
        </div>
      </section>
    </div>
  </div>
</div>
