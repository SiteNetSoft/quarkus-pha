<div
  class="pf-v6-c-page"
  id="pg-multiple-sidebar-body"
  x-data="{ sidebarOpen: true }"
  style="min-height: 400px; border: 1px solid var(--pf-t--global--border--color--default)"
>
  <header class="pf-v6-c-masthead">
    <div class="pf-v6-c-masthead__main">
      <span class="pf-v6-c-masthead__toggle">
        <button
          class="pf-v6-c-button pf-m-plain"
          type="button"
          aria-label="Global navigation"
          :aria-expanded="sidebarOpen.toString()"
          @click="sidebarOpen = !sidebarOpen"
        >
          <span class="pf-v6-c-button__icon">{icons:svg('fa:bars').raw}</span>
        </button>
      </span>
      <div class="pf-v6-c-masthead__brand"><strong>Logo</strong></div>
    </div>
    <div class="pf-v6-c-masthead__content">
      <div class="pf-v6-c-toolbar">
        <div class="pf-v6-c-toolbar__content">
          <div class="pf-v6-c-toolbar__content-section">
            <div class="pf-v6-c-toolbar__item">header-tools</div>
          </div>
        </div>
      </div>
    </div>
  </header>
  <div
    class="pf-v6-c-page__sidebar"
    :class="{ 'pf-m-expanded': sidebarOpen, 'pf-m-collapsed': !sidebarOpen }"
    x-show="sidebarOpen"
  >
    <div class="pf-v6-c-page__sidebar-body pf-m-context-selector">
      First sidebar body (for a context selector/perspective switcher)
    </div>
    <div class="pf-v6-c-page__sidebar-body pf-m-fill">
      <nav class="pf-v6-c-nav" aria-label="Global">
        <ul class="pf-v6-c-nav__list">
          <li class="pf-v6-c-nav__item"><a href="#" class="pf-v6-c-nav__link pf-m-current" aria-current="page">Nav item 1</a></li>
          <li class="pf-v6-c-nav__item"><a href="#" class="pf-v6-c-nav__link">Nav item 2</a></li>
          <li class="pf-v6-c-nav__item"><a href="#" class="pf-v6-c-nav__link">Nav item 3</a></li>
        </ul>
      </nav>
    </div>
  </div>
  <div class="pf-v6-c-page__main-container">
    <div class="pf-v6-c-page__main" tabindex="-1">
      <section class="pf-v6-c-page__main-section">
        <div class="pf-v6-c-page__main-body">
          The sidebar stacks two <code class="ws-code">pf-v6-c-page__sidebar-body</code> elements — the first with
          <code class="ws-code">pf-m-context-selector</code>, the second with <code class="ws-code">pf-m-fill</code> to
          take the remaining height.
        </div>
      </section>
    </div>
  </div>
</div>
