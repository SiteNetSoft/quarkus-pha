<div
  class="pf-v6-c-page"
  id="pg-main-section-padding"
  style="min-height: 360px; border: 1px solid var(--pf-t--global--border--color--default)"
>
  <header class="pf-v6-c-masthead">
    <div class="pf-v6-c-masthead__main">
      <div class="pf-v6-c-masthead__brand"><strong>Logo</strong></div>
    </div>
  </header>
  <div class="pf-v6-c-page__main-container">
    <div class="pf-v6-c-page__main" tabindex="-1">
      <section class="pf-v6-c-page__main-section">
        <div class="pf-v6-c-page__main-body">Section with default padding.</div>
      </section>
      <section class="pf-v6-c-page__main-section pf-m-no-padding">
        <div class="pf-v6-c-page__main-body">
          Section with <code class="ws-code">pf-m-no-padding</code> — content runs edge to edge.
        </div>
      </section>
      <section class="pf-v6-c-page__main-section pf-m-no-padding pf-m-padding-on-md">
        <div class="pf-v6-c-page__main-body">
          Section with <code class="ws-code">pf-m-no-padding pf-m-padding-on-md</code> — padding returns at the md
          breakpoint.
        </div>
      </section>
    </div>
  </div>
</div>
