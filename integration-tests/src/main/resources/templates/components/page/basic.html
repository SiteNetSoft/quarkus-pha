{! Page shell — masthead + main section. Use as the outermost wrapper for app chrome. !}
<div class="pf-v6-c-page" id="pg-basic" style="min-height: 360px; border: 1px solid var(--pf-t--global--border--color--default)">
  <header class="pf-v6-c-masthead">
    <div class="pf-v6-c-masthead__main">
      <div class="pf-v6-c-masthead__brand"><strong>App name</strong></div>
    </div>
  </header>
  <div class="pf-v6-c-page__main-container">
    <main class="pf-v6-c-page__main" tabindex="-1">
      <section class="pf-v6-c-page__main-section">
        <div class="pf-v6-c-page__main-body" style="padding: 1rem">
          <h1 class="pf-v6-c-title pf-m-2xl">Welcome</h1>
          <p style="margin-top: 1rem">Page content lives inside <code>pf-v6-c-page__main</code>. Combine with the Layouts components (Sidebar, Stack, Flex) to structure the body.</p>
        </div>
      </section>
    </main>
  </div>
</div>
