<div class="pf-v6-c-login" id="lp-show-hide" x-data="{ show: false }">
  <div class="pf-v6-c-login__container">
    <main class="pf-v6-c-login__main">
      <header class="pf-v6-c-login__main-header">
        <h1 class="pf-v6-c-title pf-m-3xl">Log in to your account</h1>
        <p class="pf-v6-c-login__main-header-desc">Enter your single sign-on LDAP credentials.</p>
      </header>
      <div class="pf-v6-c-login__main-body">
        <form class="pf-v6-c-form" novalidate @submit.prevent>
          <div class="pf-v6-c-form__group">
            <div class="pf-v6-c-form__group-label">
              <label class="pf-v6-c-form__label" for="lp-show-hide-username-field">
                <span class="pf-v6-c-form__label-text">Username</span>
                <span class="pf-v6-c-form__label-required" aria-hidden="true">&#42;</span>
              </label>
            </div>
            <div class="pf-v6-c-form__group-control">
              <span class="pf-v6-c-form-control pf-m-required">
                <input type="text" id="lp-show-hide-username-field" name="lp-show-hide-username" required />
              </span>
            </div>
          </div>
          <div class="pf-v6-c-form__group">
            <div class="pf-v6-c-form__group-label">
              <label class="pf-v6-c-form__label" for="lp-show-hide-password-field">
                <span class="pf-v6-c-form__label-text">Password</span>
                <span class="pf-v6-c-form__label-required" aria-hidden="true">&#42;</span>
              </label>
            </div>
            <div class="pf-v6-c-form__group-control">
              <div class="pf-v6-c-input-group">
                <div class="pf-v6-c-input-group__item pf-m-fill">
                  <span class="pf-v6-c-form-control pf-m-required">
                    <input
                      type="password"
                      :type="show ? 'text' : 'password'"
                      id="lp-show-hide-password-field"
                      name="lp-show-hide-password"
                      required
                    />
                  </span>
                </div>
                <div class="pf-v6-c-input-group__item">
                  <button
                    class="pf-v6-c-button pf-m-plain"
                    type="button"
                    aria-label="Show password"
                    :aria-label="show ? 'Hide password' : 'Show password'"
                    :aria-pressed="show.toString()"
                    @click="show = !show"
                  >
                    <span class="pf-v6-c-button__icon">
                      <span x-show="!show">{icons:svg('fa:eye').raw}</span>
                      <span x-show="show" x-cloak>{icons:svg('fa:eye-slash').raw}</span>
                    </span>
                  </button>
                </div>
              </div>
            </div>
          </div>
          <div class="pf-v6-c-form__group pf-m-action">
            <div class="pf-v6-c-form__actions">
              <button type="submit" class="pf-v6-c-button pf-m-primary pf-m-block">
                <span class="pf-v6-c-button__text">Log in</span>
              </button>
            </div>
          </div>
        </form>
      </div>
      <footer class="pf-v6-c-login__main-footer">
        <div class="pf-v6-c-login__main-footer-band">
          <p class="pf-v6-c-login__main-footer-band-item"><a href="#">Forgot username or password?</a></p>
        </div>
      </footer>
    </main>
  </div>
</div>
