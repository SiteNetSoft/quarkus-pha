{! Search input — text-input-group composed with the search icon. !}
<div class="pf-v6-c-text-input-group" id="si-basic">
  <div class="pf-v6-c-text-input-group__main pf-m-icon">
    <span class="pf-v6-c-text-input-group__text">
      <span class="pf-v6-c-text-input-group__icon">{icons:svg('fa:magnifying-glass').raw}</span>
      <input class="pf-v6-c-text-input-group__text-input" type="search" placeholder="Search…" aria-label="Search">
    </span>
  </div>
</div>
