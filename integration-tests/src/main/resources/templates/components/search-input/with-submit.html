<div class="pf-v6-c-input-group" id="si-submit" x-data="{ value: '', submitted: '' }" style="max-width: 420px">
  <div class="pf-v6-c-input-group__item pf-m-fill">
    <div class="pf-v6-c-text-input-group">
  <div class="pf-v6-c-text-input-group__main pf-m-icon">
    <span class="pf-v6-c-text-input-group__text">
      <span class="pf-v6-c-text-input-group__icon">{icons:svg('fa:magnifying-glass').raw}</span>
      <input class="pf-v6-c-text-input-group__text-input" type="search" id="si-submit-input" placeholder="Search…" aria-label="Search" x-model="value" />
    </span>
  </div>
      <div class="pf-v6-c-text-input-group__utilities" x-show="value !== ''">
    <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Clear search" @click="value = ''">
      <span class="pf-v6-c-button__icon">{icons:svg('fa:xmark').raw}</span>
    </button>
      </div>
    </div>
  </div>
  <div class="pf-v6-c-input-group__item">
    <button class="pf-v6-c-button pf-m-control" type="button" aria-label="Search" @click="submitted = value">
      <span class="pf-v6-c-button__text">Search</span>
    </button>
  </div>
  <p x-show="submitted !== ''" x-cloak style="align-self: center; margin-inline-start: 0.75rem">Searched for: <strong x-text="submitted"></strong></p>
</div>
