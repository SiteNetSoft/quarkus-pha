{! Advanced search rendered with the attribute panel already open — same live toggle as above. !}
<div id="si-advanced-expanded" x-data="{ open: true, value: '', username: '', date: '' }" style="position: relative; max-width: 420px" @click.outside="open = false">
  <div class="pf-v6-c-text-input-group">
  <div class="pf-v6-c-text-input-group__main pf-m-icon">
    <span class="pf-v6-c-text-input-group__text">
      <span class="pf-v6-c-text-input-group__icon">{icons:svg('fa:magnifying-glass').raw}</span>
      <input class="pf-v6-c-text-input-group__text-input" type="search" id="si-advanced-expanded-input" placeholder="Search…" aria-label="Search" x-model="value" />
    </span>
  </div>
    <div class="pf-v6-c-text-input-group__utilities">
      <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Advanced search" :aria-expanded="open.toString()" @click="open = !open">
        <span class="pf-v6-c-button__icon">{icons:svg('fa:caret-down').raw}</span>
      </button>
    </div>
  </div>
  <div class="pf-v6-c-panel pf-m-raised" x-show="open" x-cloak style="position: absolute; top: 100%; left: 0; right: 0; z-index: 200">
    <div class="pf-v6-c-panel__main">
      <div class="pf-v6-c-panel__main-body">
        <form class="pf-v6-c-form" @submit.prevent="value = (username !== '' ? 'username:' + username + ' ' : '') + (date !== '' ? 'date:' + date : ''); open = false">
          <div class="pf-v6-c-form__group">
            <div class="pf-v6-c-form__group-label">
              <label class="pf-v6-c-form__label" for="si-advanced-expanded-username"><span class="pf-v6-c-form__label-text">Username</span></label>
            </div>
            <div class="pf-v6-c-form__group-control">
              <span class="pf-v6-c-form-control"><input type="text" id="si-advanced-expanded-username" x-model="username" /></span>
            </div>
          </div>
          <div class="pf-v6-c-form__group">
            <div class="pf-v6-c-form__group-label">
              <label class="pf-v6-c-form__label" for="si-advanced-expanded-date"><span class="pf-v6-c-form__label-text">Date</span></label>
            </div>
            <div class="pf-v6-c-form__group-control">
              <span class="pf-v6-c-form-control"><input type="text" id="si-advanced-expanded-date" placeholder="YYYY-MM-DD" x-model="date" /></span>
            </div>
          </div>
          <div class="pf-v6-c-form__group pf-m-action">
            <div class="pf-v6-c-form__actions">
              <button class="pf-v6-c-button pf-m-primary" type="submit"><span class="pf-v6-c-button__text">Search</span></button>
              <button class="pf-v6-c-button pf-m-link" type="button" @click="username = ''; date = ''; value = ''">
                <span class="pf-v6-c-button__text">Reset</span>
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
