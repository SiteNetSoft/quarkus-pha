{! Custom menus = drop arbitrary HTML between the toggle and the menu list — header, search, footer. !}
<div x-data="{ open: false }" style="position: relative; display: inline-block">
  <button class="pf-v6-c-menu-toggle" type="button" :class="open ? 'pf-m-expanded' : ''" :aria-expanded="open" @click="open = !open" id="cm-basic-toggle">
    <span class="pf-v6-c-menu-toggle__text">Project</span>
    <span class="pf-v6-c-menu-toggle__controls"><span class="pf-v6-c-menu-toggle__toggle-icon">{icons:svg('fa:caret-down').raw}</span></span>
  </button>
  <div class="pf-v6-c-menu" x-show="open" x-cloak @click.outside="open = false" style="position: absolute; top: 100%; left: 0; z-index: 200; min-width: 18rem">
    <header class="pf-v6-c-menu__header" style="padding: 0.5rem 1rem; border-bottom: 1px solid var(--pf-t--global--border--color--default)">
      <strong>Recent projects</strong>
    </header>
    <div class="pf-v6-c-menu__content">
      <ul class="pf-v6-c-menu__list" role="menu">
        <li class="pf-v6-c-menu__list-item"><button class="pf-v6-c-menu__item" type="button" role="menuitem"><span class="pf-v6-c-menu__item-main"><span class="pf-v6-c-menu__item-text">Apollo</span><span class="pf-v6-c-menu__item-description">Backend service</span></span></button></li>
        <li class="pf-v6-c-menu__list-item"><button class="pf-v6-c-menu__item" type="button" role="menuitem"><span class="pf-v6-c-menu__item-main"><span class="pf-v6-c-menu__item-text">Mercury</span><span class="pf-v6-c-menu__item-description">Web frontend</span></span></button></li>
      </ul>
    </div>
    <footer class="pf-v6-c-menu__footer" style="padding: 0.5rem 1rem; border-top: 1px solid var(--pf-t--global--border--color--default)">
      <a href="#" class="pf-v6-c-button pf-m-link pf-m-inline"><span class="pf-v6-c-button__text">Browse all projects</span></a>
    </footer>
  </div>
</div>
