{! Free-form / whole-row inline edit — one Edit toggle switches every field to an input at once, with a
   footer action group (Save / Cancel). All fields share one Alpine editing state. !}
<form
  class="pf-v6-c-inline-edit"
  id="ie-multiple"
  style="max-width: 32rem"
  x-data="{ editing: false, name: 'Jane Smith', team: 'Platform', role: 'Editor' }"
  :class="{ 'pf-m-inline-editable': editing }"
>
  <div class="pf-v6-c-inline-edit__group" x-show="!editing">
    <button class="pf-v6-c-button pf-m-secondary" type="button" aria-label="Edit all fields" @click="editing = true">
      <span class="pf-v6-c-button__icon">{icons:svg('fa:pencil-alt').raw}</span>
      <span class="pf-v6-c-button__text">Edit</span>
    </button>
  </div>
  <div class="pf-v6-c-inline-edit__group">
    <span class="pf-v6-c-inline-edit__label pf-m-bold">Name</span>
    <span class="pf-v6-c-inline-edit__value" x-show="!editing" x-text="name"></span>
    <div class="pf-v6-c-inline-edit__input" x-show="editing" x-cloak>
      <span class="pf-v6-c-form-control"><input type="text" x-model="name" aria-label="Name" /></span>
    </div>
  </div>
  <div class="pf-v6-c-inline-edit__group">
    <span class="pf-v6-c-inline-edit__label pf-m-bold">Team</span>
    <span class="pf-v6-c-inline-edit__value" x-show="!editing" x-text="team"></span>
    <div class="pf-v6-c-inline-edit__input" x-show="editing" x-cloak>
      <span class="pf-v6-c-form-control"><input type="text" x-model="team" aria-label="Team" /></span>
    </div>
  </div>
  <div class="pf-v6-c-inline-edit__group">
    <span class="pf-v6-c-inline-edit__label pf-m-bold">Role</span>
    <span class="pf-v6-c-inline-edit__value" x-show="!editing" x-text="role"></span>
    <div class="pf-v6-c-inline-edit__input" x-show="editing" x-cloak>
      <span class="pf-v6-c-form-control"><input type="text" x-model="role" aria-label="Role" /></span>
    </div>
  </div>
  <div class="pf-v6-c-inline-edit__group pf-m-footer" x-show="editing" x-cloak>
    <div class="pf-v6-c-inline-edit__group pf-m-action-group">
      <div class="pf-v6-c-inline-edit__action">
        <button class="pf-v6-c-button pf-m-primary" type="button" @click="editing = false">
          <span class="pf-v6-c-button__text">Save</span>
        </button>
      </div>
      <div class="pf-v6-c-inline-edit__action">
        <button class="pf-v6-c-button pf-m-link" type="button" @click="editing = false">
          <span class="pf-v6-c-button__text">Cancel</span>
        </button>
      </div>
    </div>
  </div>
</form>
