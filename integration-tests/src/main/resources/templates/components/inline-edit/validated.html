{! Validated inline edit — the input reflects valid/invalid state as you type (required field). Empty
   shows pf-m-error + an error helper text and disables Save; non-empty shows pf-m-success. !}
<form class="pf-v6-c-inline-edit pf-m-inline-editable" id="ie-validated" style="max-width: 28rem" x-data="{ val: '' }">
  <div class="pf-v6-c-inline-edit__group">
    <span class="pf-v6-c-inline-edit__label pf-m-bold">Display name</span>
    <div class="pf-v6-c-inline-edit__input">
      <span class="pf-v6-c-form-control" :class="val.trim().length === 0 ? 'pf-m-error' : 'pf-m-success'">
        <input
          type="text"
          x-model="val"
          aria-label="Display name"
          required
          :aria-invalid="val.trim().length === 0"
          placeholder="Type to validate…"
        />
      </span>
    </div>
    <div class="pf-v6-c-inline-edit__group pf-m-action-group pf-m-icon-group">
      <div class="pf-v6-c-inline-edit__action pf-m-valid">
        <button
          class="pf-v6-c-button pf-m-plain"
          type="button"
          aria-label="Save"
          :disabled="val.trim().length === 0"
        >
          {icons:svg('fa:check').raw}
        </button>
      </div>
      <div class="pf-v6-c-inline-edit__action">
        <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Cancel" @click="val = ''">
          {icons:svg('fa:times').raw}
        </button>
      </div>
    </div>
  </div>
  <div class="pf-v6-c-form__helper-text" x-show="val.trim().length === 0" x-cloak>
    <div class="pf-v6-c-helper-text">
      <div class="pf-v6-c-helper-text__item pf-m-error">
        <span class="pf-v6-c-helper-text__item-icon">{icons:svg('fa:exclamation-circle').raw}</span>
        <span class="pf-v6-c-helper-text__item-text">Display name is required.</span>
      </div>
    </div>
  </div>
</form>
