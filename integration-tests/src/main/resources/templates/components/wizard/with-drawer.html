{! Wizard hosting an in-body drawer — the step content is a drawer whose panel opens
   from the step's main area (PF "With drawer"). !}
<div class="pf-v6-c-wizard" id="wiz-drawer" x-data="{ drawerOpen: false }" style="min-height: 320px">
  <div class="pf-v6-c-wizard__outer-wrap">
    <div class="pf-v6-c-wizard__inner-wrap">
      <nav class="pf-v6-c-wizard__nav" aria-label="Wizard steps">
        <ol class="pf-v6-c-wizard__nav-list">
          <li class="pf-v6-c-wizard__nav-item">
            <button class="pf-v6-c-wizard__nav-link pf-m-current" type="button" aria-current="step">
              <span class="pf-v6-c-wizard__nav-link-main"><span class="pf-v6-c-wizard__nav-link-text">Information</span></span>
            </button>
          </li>
          <li class="pf-v6-c-wizard__nav-item">
            <button class="pf-v6-c-wizard__nav-link" type="button">
              <span class="pf-v6-c-wizard__nav-link-main"><span class="pf-v6-c-wizard__nav-link-text">Review</span></span>
            </button>
          </li>
        </ol>
      </nav>
      <div class="pf-v6-c-wizard__main">
        <div class="pf-v6-c-drawer" :class="drawerOpen ? 'pf-m-expanded' : ''" style="height: 100%">
          <div class="pf-v6-c-drawer__main">
            <div class="pf-v6-c-drawer__content">
              <div class="pf-v6-c-drawer__body">
                <div class="pf-v6-c-wizard__main-body">
                  <p class="pf-v6-c-content--p">Step content lives in the drawer content area.</p>
                  <button class="pf-v6-c-button pf-m-secondary" type="button" @click="drawerOpen = !drawerOpen" :aria-expanded="drawerOpen.toString()">
                    <span class="pf-v6-c-button__text" x-text="drawerOpen ? 'Close drawer' : 'Open drawer'">Open drawer</span>
                  </button>
                </div>
              </div>
            </div>
            <div class="pf-v6-c-drawer__panel" x-show="drawerOpen" x-cloak>
              <div class="pf-v6-c-drawer__body">
                <div class="pf-v6-c-drawer__head">
                  <span>Step details drawer panel</span>
                  <div class="pf-v6-c-drawer__actions">
                    <div class="pf-v6-c-drawer__close">
                      <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Close drawer" @click="drawerOpen = false">
                        <span class="pf-v6-c-button__icon">{icons:svg('fa:xmark').raw}</span>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <footer class="pf-v6-c-wizard__footer">
      <div class="pf-v6-c-action-list">
        <div class="pf-v6-c-action-list__group">
          <div class="pf-v6-c-action-list__item">
            <button class="pf-v6-c-button pf-m-primary" type="button"><span class="pf-v6-c-button__text">Next</span></button>
          </div>
          <div class="pf-v6-c-action-list__item">
            <button class="pf-v6-c-button pf-m-secondary" type="button" disabled><span class="pf-v6-c-button__text">Back</span></button>
          </div>
          <div class="pf-v6-c-action-list__item">
            <button class="pf-v6-c-button pf-m-link" type="button"><span class="pf-v6-c-button__text">Cancel</span></button>
          </div>
        </div>
      </div>
    </footer>
  </div>
</div>
