<div x-data="{ step: 1, mode: 'quick' }">
  <div class="pf-v6-c-wizard" id="wiz-progressive-steps">
    <div class="pf-v6-c-wizard__outer-wrap">
      <div class="pf-v6-c-wizard__inner-wrap">
        <nav class="pf-v6-c-wizard__nav" aria-label="Steps">
          <ol class="pf-v6-c-wizard__nav-list">
<li class="pf-v6-c-wizard__nav-item">
  <button type="button" class="pf-v6-c-wizard__nav-link" :class="{ 'pf-m-current': step === 1 }" :aria-current="step === 1 ? 'step' : false" @click="step = 1">
    <span class="pf-v6-c-wizard__nav-link-main"><span class="pf-v6-c-wizard__nav-link-text">Setup mode</span></span>
  </button>
</li>
<li class="pf-v6-c-wizard__nav-item" x-show="mode === 'custom'" x-cloak>
  <button type="button" class="pf-v6-c-wizard__nav-link" :class="{ 'pf-m-current': step === 2 }" @click="step = 2">
    <span class="pf-v6-c-wizard__nav-link-main"><span class="pf-v6-c-wizard__nav-link-text">Custom settings</span></span>
  </button>
</li>
<li class="pf-v6-c-wizard__nav-item">
  <button type="button" class="pf-v6-c-wizard__nav-link" :class="{ 'pf-m-current': step === 3 }" :aria-current="step === 3 ? 'step' : false" @click="step = 3">
    <span class="pf-v6-c-wizard__nav-link-main"><span class="pf-v6-c-wizard__nav-link-text">Review</span></span>
  </button>
</li>
          </ol>
        </nav>
        <div class="pf-v6-c-wizard__main">
          <div class="pf-v6-c-wizard__main-body">
<div x-show="step === 1">
  <h2 class="pf-v6-c-content--h2">Setup mode</h2>
  <div class="pf-v6-c-radio">
    <input class="pf-v6-c-radio__input" type="radio" id="wiz-prog-quick" name="wiz-prog-mode" value="quick" x-model="mode" />
    <label class="pf-v6-c-radio__label" for="wiz-prog-quick">Quick setup</label>
  </div>
  <div class="pf-v6-c-radio">
    <input class="pf-v6-c-radio__input" type="radio" id="wiz-prog-custom" name="wiz-prog-mode" value="custom" x-model="mode" />
    <label class="pf-v6-c-radio__label" for="wiz-prog-custom">Custom setup (adds a step)</label>
  </div>
</div>
<div x-show="step === 2" x-cloak>
  <h2 class="pf-v6-c-content--h2">Custom settings</h2>
  <p>Custom settings content.</p>
</div>
<div x-show="step === 3" x-cloak>
  <h2 class="pf-v6-c-content--h2">Review</h2>
  <p>Review content.</p>
</div>
          </div>
        </div>
      </div>
      <footer class="pf-v6-c-wizard__footer">
<button type="button" class="pf-v6-c-button pf-m-primary" :disabled="step === 3" @click="step = (step === 1 && mode === 'custom') ? 2 : 3">
  <span class="pf-v6-c-button__text">Next</span>
</button>
<button type="button" class="pf-v6-c-button pf-m-secondary" :disabled="step === 1" @click="step = (step === 3 && mode === 'custom') ? 2 : 1">
  <span class="pf-v6-c-button__text">Back</span>
</button>
      </footer>
    </div>
  </div>
</div>
