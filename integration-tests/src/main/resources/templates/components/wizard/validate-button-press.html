<div x-data="{ step: 1, name: '', tried: false }">
  <div class="pf-v6-c-wizard" id="wiz-validate-button-press">
    <div class="pf-v6-c-wizard__outer-wrap">
      <div class="pf-v6-c-wizard__inner-wrap">
        <nav class="pf-v6-c-wizard__nav" aria-label="Steps">
          <ol class="pf-v6-c-wizard__nav-list">
<li class="pf-v6-c-wizard__nav-item">
  <button type="button" class="pf-v6-c-wizard__nav-link" :class="{ 'pf-m-current': step === 1 }" :aria-current="step === 1 ? 'step' : false" @click="step = 1">
    <span class="pf-v6-c-wizard__nav-link-main"><span class="pf-v6-c-wizard__nav-link-text">Name</span></span>
  </button>
</li>
<li class="pf-v6-c-wizard__nav-item">
  <button type="button" class="pf-v6-c-wizard__nav-link" :class="{ 'pf-m-current': step === 2 }" :aria-current="step === 2 ? 'step' : false" @click="step = 2">
    <span class="pf-v6-c-wizard__nav-link-main"><span class="pf-v6-c-wizard__nav-link-text">Review</span></span>
  </button>
</li>
          </ol>
        </nav>
        <div class="pf-v6-c-wizard__main">
          <div class="pf-v6-c-wizard__main-body">
<div x-show="step === 1">
  <h2 class="pf-v6-c-content--h2">Name</h2>
  <div class="pf-v6-c-helper-text" x-show="tried && name.trim() === ''" x-cloak aria-live="polite">
    <div class="pf-v6-c-helper-text__item pf-m-error">
      <span class="pf-v6-c-helper-text__item-icon">{icons:svg('fa:circle-exclamation').raw}</span>
      <span class="pf-v6-c-helper-text__item-text">A cluster name is required.</span>
    </div>
  </div>
  <form class="pf-v6-c-form" @submit.prevent>
    <div class="pf-v6-c-form__group">
      <div class="pf-v6-c-form__group-control">
        <span class="pf-v6-c-form-control pf-m-required" :class="{ 'pf-m-error': tried && name.trim() === '' }">
          <input type="text" id="wiz-validate-button-press-name" aria-label="Cluster name" x-model="name" />
        </span>
      </div>
    </div>
  </form>
</div>
<div x-show="step === 2" x-cloak>
  <h2 class="pf-v6-c-content--h2">Review</h2>
  <p>Review content.</p>
</div>
          </div>
        </div>
      </div>
      <footer class="pf-v6-c-wizard__footer">
<button type="button" class="pf-v6-c-button pf-m-primary" @click="tried = true; if (name.trim() !== '') step = 2">
  <span class="pf-v6-c-button__text">Next</span>
</button>
<button type="button" class="pf-v6-c-button pf-m-secondary" :disabled="step === 1" @click="step = 1">
  <span class="pf-v6-c-button__text">Back</span>
</button>
      </footer>
    </div>
  </div>
</div>
