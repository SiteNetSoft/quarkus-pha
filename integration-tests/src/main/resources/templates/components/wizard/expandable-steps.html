<div x-data="{ step: 1, open: true }">
  <div class="pf-v6-c-wizard" id="wiz-expandable-steps">
    <div class="pf-v6-c-wizard__outer-wrap">
      <div class="pf-v6-c-wizard__inner-wrap">
        <nav class="pf-v6-c-wizard__nav" aria-label="Steps">
          <ol class="pf-v6-c-wizard__nav-list">
<li class="pf-v6-c-wizard__nav-item">
  <button type="button" class="pf-v6-c-wizard__nav-link" :class="{ 'pf-m-current': step === 1 }" :aria-current="step === 1 ? 'step' : false" @click="step = 1">
    <span class="pf-v6-c-wizard__nav-link-main"><span class="pf-v6-c-wizard__nav-link-text">Information</span></span>
  </button>
</li>
<li class="pf-v6-c-wizard__nav-item pf-m-expandable" :class="{ 'pf-m-expanded': open }">
  <button type="button" class="pf-v6-c-wizard__nav-link" :aria-expanded="open.toString()" @click="open = !open">
    <span class="pf-v6-c-wizard__nav-link-main"><span class="pf-v6-c-wizard__nav-link-text">Configuration</span></span>
    <span class="pf-v6-c-wizard__nav-link-toggle">
      <span class="pf-v6-c-wizard__nav-link-toggle-icon">{icons:svg('fa:angle-right').raw}</span>
    </span>
  </button>
  <ol class="pf-v6-c-wizard__nav-list" x-show="open" x-cloak>
    <li class="pf-v6-c-wizard__nav-item">
      <button type="button" class="pf-v6-c-wizard__nav-link" :class="{ 'pf-m-current': step === 2 }" @click="step = 2">
        <span class="pf-v6-c-wizard__nav-link-main"><span class="pf-v6-c-wizard__nav-link-text">Network</span></span>
      </button>
    </li>
    <li class="pf-v6-c-wizard__nav-item">
      <button type="button" class="pf-v6-c-wizard__nav-link" :class="{ 'pf-m-current': step === 3 }" @click="step = 3">
        <span class="pf-v6-c-wizard__nav-link-main"><span class="pf-v6-c-wizard__nav-link-text">Storage</span></span>
      </button>
    </li>
  </ol>
</li>
<li class="pf-v6-c-wizard__nav-item">
  <button type="button" class="pf-v6-c-wizard__nav-link" :class="{ 'pf-m-current': step === 4 }" @click="step = 4">
    <span class="pf-v6-c-wizard__nav-link-main"><span class="pf-v6-c-wizard__nav-link-text">Review</span></span>
  </button>
</li>
          </ol>
        </nav>
        <div class="pf-v6-c-wizard__main">
          <div class="pf-v6-c-wizard__main-body">
<div x-show="step === 1" x-cloak>
  <h2 class="pf-v6-c-content--h2">Information</h2>
  <p>Information content.</p>
</div>
<div x-show="step === 2" x-cloak>
  <h2 class="pf-v6-c-content--h2">Network</h2>
  <p>Network content.</p>
</div>
<div x-show="step === 3" x-cloak>
  <h2 class="pf-v6-c-content--h2">Storage</h2>
  <p>Storage content.</p>
</div>
<div x-show="step === 4" x-cloak>
  <h2 class="pf-v6-c-content--h2">Review</h2>
  <p>Review content.</p>
</div>
          </div>
        </div>
      </div>
      <footer class="pf-v6-c-wizard__footer">
<button type="button" class="pf-v6-c-button pf-m-primary" :disabled="step === 4" @click="step = Math.min(4, step + 1)">
  <span class="pf-v6-c-button__text">Next</span>
</button>
<button type="button" class="pf-v6-c-button pf-m-secondary" :disabled="step === 1" @click="step = Math.max(1, step - 1)">
  <span class="pf-v6-c-button__text">Back</span>
</button>
<button type="button" class="pf-v6-c-button pf-m-link">
  <span class="pf-v6-c-button__text">Cancel</span>
</button>
      </footer>
    </div>
  </div>
</div>
