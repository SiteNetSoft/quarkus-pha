<div x-data="{ step: 1 }">
  <div class="pf-v6-c-wizard" id="wiz-custom-footer">
    <div class="pf-v6-c-wizard__outer-wrap">
      <div class="pf-v6-c-wizard__inner-wrap">
        <nav class="pf-v6-c-wizard__nav" aria-label="Steps">
          <ol class="pf-v6-c-wizard__nav-list">
<li class="pf-v6-c-wizard__nav-item">
  <button type="button" class="pf-v6-c-wizard__nav-link" :class="{ 'pf-m-current': step === 1 }" :aria-current="step === 1 ? 'step' : false" @click="step = 1">
    <span class="pf-v6-c-wizard__nav-link-main"><span class="pf-v6-c-wizard__nav-link-text">Information</span></span>
  </button>
</li>
<li class="pf-v6-c-wizard__nav-item">
  <button type="button" class="pf-v6-c-wizard__nav-link" :class="{ 'pf-m-current': step === 2 }" :aria-current="step === 2 ? 'step' : false" @click="step = 2">
    <span class="pf-v6-c-wizard__nav-link-main"><span class="pf-v6-c-wizard__nav-link-text">Configuration</span></span>
  </button>
</li>
<li class="pf-v6-c-wizard__nav-item">
  <button type="button" class="pf-v6-c-wizard__nav-link" :class="{ 'pf-m-current': step === 3 }" :aria-current="step === 3 ? 'step' : false" @click="step = 3">
    <span class="pf-v6-c-wizard__nav-link-main"><span class="pf-v6-c-wizard__nav-link-text">Review</span></span>
  </button>
</li>
          </ol>
        </nav>
        <div class="pf-v6-c-wizard__main">
          <div class="pf-v6-c-wizard__main-body">
<div x-show="step === 1" x-cloak>
  <h2 class="pf-v6-c-content--h2">Information</h2>
  <p>Information content.</p>
</div>
<div x-show="step === 2" x-cloak>
  <h2 class="pf-v6-c-content--h2">Configuration</h2>
  <p>Configuration content.</p>
</div>
<div x-show="step === 3" x-cloak>
  <h2 class="pf-v6-c-content--h2">Review</h2>
  <p>Review content.</p>
</div>
          </div>
        </div>
      </div>
      <footer class="pf-v6-c-wizard__footer">
<button type="button" class="pf-v6-c-button pf-m-primary" :disabled="step === 3" @click="step = step + 1">
  <span class="pf-v6-c-button__text">Continue</span>
</button>
<button type="button" class="pf-v6-c-button pf-m-secondary" :disabled="step === 1" @click="step = step - 1">
  <span class="pf-v6-c-button__text">Go back</span>
</button>
<button type="button" class="pf-v6-c-button pf-m-tertiary">
  <span class="pf-v6-c-button__text">Save draft</span>
</button>
<button type="button" class="pf-v6-c-button pf-m-link pf-m-danger">
  <span class="pf-v6-c-button__text">Abandon</span>
</button>
      </footer>
    </div>
  </div>
</div>
