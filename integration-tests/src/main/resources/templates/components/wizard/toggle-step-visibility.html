<div x-data="{ step: 1, showOptional: true }">
  <div class="pf-v6-c-check" style="margin-bottom: 1rem">
    <input class="pf-v6-c-check__input" type="checkbox" id="wiz-toggle-visibility-check" x-model="showOptional" @change="if (!showOptional && step === 2) step = 1" />
    <label class="pf-v6-c-check__label" for="wiz-toggle-visibility-check">Show the optional step</label>
  </div>
  <div class="pf-v6-c-wizard" id="wiz-toggle-step-visibility">
    <div class="pf-v6-c-wizard__outer-wrap">
      <div class="pf-v6-c-wizard__inner-wrap">
        <nav class="pf-v6-c-wizard__nav" aria-label="Steps">
          <ol class="pf-v6-c-wizard__nav-list">
<li class="pf-v6-c-wizard__nav-item">
  <button type="button" class="pf-v6-c-wizard__nav-link" :class="{ 'pf-m-current': step === 1 }" :aria-current="step === 1 ? 'step' : false" @click="step = 1">
    <span class="pf-v6-c-wizard__nav-link-main"><span class="pf-v6-c-wizard__nav-link-text">Information</span></span>
  </button>
</li>
            <li class="pf-v6-c-wizard__nav-item" x-show="showOptional" x-cloak>
              <button type="button" class="pf-v6-c-wizard__nav-link" :class="{ 'pf-m-current': step === 2 }" @click="step = 2">
                <span class="pf-v6-c-wizard__nav-link-main"><span class="pf-v6-c-wizard__nav-link-text">Optional step</span></span>
              </button>
            </li>
<li class="pf-v6-c-wizard__nav-item">
  <button type="button" class="pf-v6-c-wizard__nav-link" :class="{ 'pf-m-current': step === 3 }" :aria-current="step === 3 ? 'step' : false" @click="step = 3">
    <span class="pf-v6-c-wizard__nav-link-main"><span class="pf-v6-c-wizard__nav-link-text">Review</span></span>
  </button>
</li>
          </ol>
        </nav>
        <div class="pf-v6-c-wizard__main">
          <div class="pf-v6-c-wizard__main-body">
<div x-show="step === 1" x-cloak>
  <h2 class="pf-v6-c-content--h2">Information</h2>
  <p>Information content.</p>
</div>
<div x-show="step === 2" x-cloak>
  <h2 class="pf-v6-c-content--h2">Optional step</h2>
  <p>Optional step content.</p>
</div>
<div x-show="step === 3" x-cloak>
  <h2 class="pf-v6-c-content--h2">Review</h2>
  <p>Review content.</p>
</div>
          </div>
        </div>
      </div>
      <footer class="pf-v6-c-wizard__footer">
        <button type="button" class="pf-v6-c-button pf-m-primary" :disabled="step === 3" @click="step = (step === 1 && showOptional) ? 2 : 3">
          <span class="pf-v6-c-button__text">Next</span>
        </button>
        <button type="button" class="pf-v6-c-button pf-m-secondary" :disabled="step === 1" @click="step = (step === 3 && showOptional) ? 2 : 1">
          <span class="pf-v6-c-button__text">Back</span>
        </button>
      </footer>
    </div>
  </div>
</div>
