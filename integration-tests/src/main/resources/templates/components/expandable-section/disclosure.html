<div class="pf-v6-c-expandable-section pf-m-display-lg pf-m-limit-width" id="es-disclosure" x-data="{ expanded: false }" :class="{ 'pf-m-expanded': expanded }">
  <button class="pf-v6-c-expandable-section__toggle" type="button" :aria-expanded="expanded" @click="expanded = !expanded">
    <span class="pf-v6-c-expandable-section__toggle-icon">{icons:svg('fa:angle-right').raw}</span>
    <span class="pf-v6-c-expandable-section__toggle-text">Disclosure variation</span>
  </button>
  <div class="pf-v6-c-expandable-section__content" x-show="expanded" x-cloak><p>The disclosure variation uses the large display size with a width limit.</p></div>
</div>
