{! Detached/expand-top — the content sits above the toggle (pf-m-expand-top). !}
<div class="pf-v6-c-expandable-section pf-m-expand-top" id="es-detached" x-data="{ expanded: false }" :class="{ 'pf-m-expanded': expanded }">
  <div class="pf-v6-c-expandable-section__content" x-show="expanded" x-cloak><p>Build log details appear above the toggle that controls them.</p></div>
  <button class="pf-v6-c-expandable-section__toggle" type="button" :aria-expanded="expanded" @click="expanded = !expanded">
    <span class="pf-v6-c-expandable-section__toggle-icon">{icons:svg('fa:angle-right').raw}</span>
    <span class="pf-v6-c-expandable-section__toggle-text">Show build details</span>
  </button>
</div>
