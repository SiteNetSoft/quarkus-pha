<div class="pf-v6-c-expandable-section pf-m-indented" id="es-indented" x-data="{ expanded: false }" :class="{ 'pf-m-expanded': expanded }">
  <button class="pf-v6-c-expandable-section__toggle" type="button" :aria-expanded="expanded" @click="expanded = !expanded">
    <span class="pf-v6-c-expandable-section__toggle-icon">{icons:svg('fa:angle-right').raw}</span>
    <span>Show indented content</span>
  </button>
  <div class="pf-v6-c-expandable-section__content" x-show="expanded" x-cloak><p>The content aligns under the toggle text instead of the icon (pf-m-indented).</p></div>
</div>
