<div style="position: relative; display: inline-block; padding: 4rem 0">
  <button class="pf-v6-c-button pf-m-danger" type="button"><span class="pf-v6-c-button__text">Delete</span></button>
  <div
    style="position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); width: 320px; visibility: visible"
  >
    <div class="pf-v6-c-popover pf-m-top pf-m-danger" id="po-danger" role="dialog">
      <div class="pf-v6-c-popover__arrow"></div>
      <div class="pf-v6-c-popover__content">
        <header class="pf-v6-c-popover__header">
          <span class="pf-v6-c-popover__title-text">Delete this project?</span>
        </header>
        <div class="pf-v6-c-popover__body">This action cannot be undone. All associated data will be removed.</div>
        <footer class="pf-v6-c-popover__footer">
          <button class="pf-v6-c-button pf-m-danger" type="button">
            <span class="pf-v6-c-button__text">Delete</span>
          </button>
          <button class="pf-v6-c-button pf-m-link" type="button">
            <span class="pf-v6-c-button__text">Cancel</span>
          </button>
        </footer>
      </div>
    </div>
  </div>
</div>
