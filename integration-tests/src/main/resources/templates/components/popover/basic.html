{! Static popover — visible position. In production wire a trigger to set popoverOpen=true. !}
<div style="position: relative; display: inline-block; padding: 4rem 0">
  <button class="pf-v6-c-button pf-m-secondary" type="button"><span class="pf-v6-c-button__text">Trigger</span></button>
  <div
    style="position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); width: 280px; visibility: visible"
  >
    <div class="pf-v6-c-popover pf-m-top" id="po-basic" role="dialog" aria-labelledby="po-basic-title">
      <div class="pf-v6-c-popover__arrow"></div>
      <div class="pf-v6-c-popover__content">
        <header class="pf-v6-c-popover__header">
          <span class="pf-v6-c-popover__title-text" id="po-basic-title">More info</span>
        </header>
        <div class="pf-v6-c-popover__body">
          Popovers contain richer content than tooltips — a title, body paragraphs, and optional footer actions.
        </div>
      </div>
    </div>
  </div>
</div>
