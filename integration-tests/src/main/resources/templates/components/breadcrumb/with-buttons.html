{! Breadcrumb items rendered as buttons instead of links (PF "With buttons"). !}
<nav class="pf-v6-c-breadcrumb" aria-label="breadcrumb with buttons" id="bc-buttons">
  <ol class="pf-v6-c-breadcrumb__list" role="list">
    <li class="pf-v6-c-breadcrumb__item">
      <button class="pf-v6-c-breadcrumb__link" type="button">Section home</button>
    </li>
    <li class="pf-v6-c-breadcrumb__item">
      <span class="pf-v6-c-breadcrumb__item-divider">{icons:svg('fa:angle-right').raw}</span>
      <button class="pf-v6-c-breadcrumb__link" type="button">Section title</button>
    </li>
    <li class="pf-v6-c-breadcrumb__item">
      <span class="pf-v6-c-breadcrumb__item-divider">{icons:svg('fa:angle-right').raw}</span>
      <button class="pf-v6-c-breadcrumb__link pf-m-current" type="button" aria-current="page">Current section title</button>
    </li>
  </ol>
</nav>
