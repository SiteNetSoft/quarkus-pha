<div
  class="pha-c-chart"
  id="ch-donut-utilization-static-thresholds"
  x-data="phaChart({
    option: {
      tooltip: { trigger: 'item' },
      legend: {
        orient: 'vertical', right: 8, top: 'middle',
        data: ['Used: 78%', 'Warning at 60%', 'Danger at 90%']
      },
      series: [
        {
          /* Outer ring: static threshold bands (0-60 / 60-90 / 90-100) in gray steps. */
          name: 'Thresholds',
          type: 'pie',
          radius: ['88%', '94%'],
          center: ['38%', '52%'],
          startAngle: 90,
          silent: false,
          avoidLabelOverlap: false,
          label: { show: false },
          labelLine: { show: false },
          data: [
            { value: 60, name: 'OK below 60%', itemStyle: { color: '#f2f2f2' }, tooltip: { show: false } },
            { value: 30, name: 'Warning at 60%', itemStyle: { color: '#e0e0e0' } },
            { value: 10, name: 'Danger at 90%', itemStyle: { color: '#c7c7c7' } }
          ]
        },
        {
          /* Inner arc: the utilization value, coloured by the band it falls in
             (78% sits in the 60-90 warning band → orange). */
          name: 'Utilization',
          type: 'pie',
          radius: ['68%', '85%'],
          center: ['38%', '52%'],
          startAngle: 90,
          avoidLabelOverlap: false,
          itemStyle: { borderRadius: 0 },
          label: {
            show: true, position: 'center',
            formatter: '{|{value|78%}\n{label|Storage used}|}',
            rich: {
              value: { fontSize: 36, fontWeight: 700, color: '#151515' },
              label: { fontSize: 13, color: '#6a6e73', padding: [6, 0, 0, 0] }
            }
          },
          labelLine: { show: false },
          data: [
            { value: 78, name: 'Used: 78%', itemStyle: { color: '#ca6c0f' } },
            { value: 22, name: 'Free', itemStyle: { color: 'rgba(0, 0, 0, 0)' }, tooltip: { show: false } }
          ]
        }
      ]
    }
  })"
>
  <div class="pha-c-chart__canvas"></div>
</div>
