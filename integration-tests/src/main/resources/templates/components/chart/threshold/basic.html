<div
  class="pha-c-chart"
  id="ch-threshold-basic"
  x-data="phaChart({
    option: {
      tooltip: { trigger: 'axis' },
      xAxis: {
        type: 'category',
        data: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00', '24:00']
      },
      yAxis: { type: 'value', name: 'CPU (%)', max: 100 },
      visualMap: {
        top: 8, right: 10, pieces: [
          { gt: 80,         color: '#b1380b', label: 'Critical' },
          { gt: 60, lte: 80, color: '#ca6c0f', label: 'Warning' },
          { lte: 60,        color: '#63993d', label: 'OK' }
        ],
        outOfRange: { color: '#999' }
      },
      series: [{
        type: 'line',
        smooth: true,
        data: [42, 38, 56, 78, 92, 64, 46],
        /* markLine only renders inside a series — dashed threshold rules at the band edges. */
        markLine: {
          silent: true,
          symbol: ['none', 'none'],
          label: { show: false },
          data: [
            { yAxis: 60, lineStyle: { color: '#ca6c0f', type: 'dashed' } },
            { yAxis: 80, lineStyle: { color: '#b1380b', type: 'dashed' } }
          ]
        }
      }]
    }
  })"
>
  <div class="pha-c-chart__canvas"></div>
</div>
