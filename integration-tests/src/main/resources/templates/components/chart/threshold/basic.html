<div
  class="pha-c-chart"
  id="ch-threshold-basic"
  x-data="phaChart({
    option: {
      tooltip: { trigger: 'axis' },
      xAxis: {
        type: 'category',
        data: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00', '24:00']
      },
      yAxis: { type: 'value', name: 'CPU (%)', max: 100 },
      visualMap: {
        top: 8, right: 10, pieces: [
          { gt: 80,         color: '#c9190b', label: 'Critical' },
          { gt: 60, lte: 80, color: '#ec7a08', label: 'Warning' },
          { lte: 60,        color: '#4cb140', label: 'OK' }
        ],
        outOfRange: { color: '#999' }
      },
      series: [{
        type: 'line',
        smooth: true,
        data: [42, 38, 52, 64, 78, 88, 92, 76, 64, 58, 54, 46, 41]
      }],
      markLine: {
        silent: true,
        symbol: ['none', 'none'],
        data: [
          { yAxis: 60, lineStyle: { color: '#ec7a08', type: 'dashed' } },
          { yAxis: 80, lineStyle: { color: '#c9190b', type: 'dashed' } }
        ]
      }
    }
  })"
>
  <div class="pha-c-chart__canvas"></div>
</div>
