<div
  class="pha-c-chart"
  id="ch-line-brush-zoom"
  x-data="phaChart({
    option: {
      tooltip: { trigger: 'axis' },
      legend: { top: 0, data: ['Active', 'New'] },
      grid: { top: 40, bottom: 80 },
      xAxis: {
        type: 'category',
        boundaryGap: false,
        data: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']
      },
      yAxis: { type: 'value', name: 'Users' },
      /* Two coupled zoomers: drag/scroll inside the plot, or drag the slider below it. */
      dataZoom: [
        { type: 'inside', start: 0, end: 100 },
        { type: 'slider', start: 0, end: 100, bottom: 20 }
      ],
      series: [
        { name: 'Active', type: 'line', smooth: true, data: [820, 932, 901, 934, 1290, 1330, 1320, 1450, 1500, 1620, 1780, 1900] },
        { name: 'New',    type: 'line', smooth: true, data: [120, 200, 150, 180,  270,  310,  250,  380,  320,  410,  390,  450] }
      ]
    }
  })"
>
  <div class="pha-c-chart__canvas"></div>
</div>
