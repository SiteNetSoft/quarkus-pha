<div
  class="pha-c-chart"
  id="ch-bullet-error-measure-custom-ticks"
  x-data="phaChart({
    option: {
      tooltip: { trigger: 'axis' },
      grid: { left: 110, right: 30, top: 20, bottom: 30 },
      xAxis: {
        type: 'value',
        max: 100,
        interval: 20,
        axisLabel: { formatter: function (value) { return value + '%'; } }
      },
      yAxis: { type: 'category', data: ['Sales', 'Signups', 'NPS'] },
      series: [
        { name: 'Critical', type: 'bar', stack: 'range', itemStyle: { color: '#f2f2f2' }, barWidth: 30, data: [50, 40, 30] },
        { name: 'Warning',  type: 'bar', stack: 'range', itemStyle: { color: '#e0e0e0' }, barWidth: 30, data: [25, 30, 30] },
        { name: 'Good',     type: 'bar', stack: 'range', itemStyle: { color: '#c7c7c7' }, barWidth: 30, data: [25, 30, 40] },
        /* barGap -66.7% = -(30+10)/(2*30): centers the 10px measure on the 30px range band */
        { name: 'Actual',   type: 'bar', barGap: '-66.7%', itemStyle: { color: '#06c' }, barWidth: 10, z: 10, data: [78, 62, 84] },
        {
          name: 'Error bound', type: 'scatter', symbol: 'rect', symbolSize: [2, 18], symbolOffset: [0, 0],
          itemStyle: { color: '#6a6e73' }, z: 20,
          data: [
            [72, 'Sales'], [84, 'Sales'],
            [56, 'Signups'], [68, 'Signups'],
            [78, 'NPS'], [90, 'NPS']
          ]
        }
      ]
    }
  })"
>
  <div class="pha-c-chart__canvas"></div>
</div>
