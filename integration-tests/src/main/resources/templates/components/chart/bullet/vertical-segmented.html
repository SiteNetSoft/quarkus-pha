<div
  class="pha-c-chart"
  id="ch-bullet-vertical-segmented"
  x-data="phaChart({
    option: {
      tooltip: { trigger: 'axis' },
      grid: { left: 60, right: 30, top: 20, bottom: 30 },
      xAxis: { type: 'category', data: ['Sales', 'Signups', 'NPS'] },
      yAxis: { type: 'value', max: 100 },
      series: [
        { name: 'Critical',  type: 'bar', stack: 'range', itemStyle: { color: '#f2f2f2' }, barWidth: 30, data: [50, 40, 30] },
        { name: 'Warning',   type: 'bar', stack: 'range', itemStyle: { color: '#e0e0e0' }, barWidth: 30, data: [25, 30, 30] },
        { name: 'Good',      type: 'bar', stack: 'range', itemStyle: { color: '#c7c7c7' }, barWidth: 30, data: [25, 30, 40] },
        /* barGap -66.7% = -(30+10)/(2*30): centers the 10px measure on the 30px range band */
        { name: 'Committed', type: 'bar', stack: 'measure', barGap: '-66.7%', itemStyle: { color: '#06c' }, barWidth: 10, z: 10, data: [48, 40, 55] },
        { name: 'Projected', type: 'bar', stack: 'measure', itemStyle: { color: '#92c5f9' }, barWidth: 10, z: 10, data: [30, 22, 29] },
        {
          name: 'Target', type: 'scatter', symbol: 'rect', symbolSize: [26, 3], symbolOffset: [0, 0],
          itemStyle: { color: '#151515' }, z: 20,
          data: [['Sales', 80], ['Signups', 75], ['NPS', 70]]
        }
      ]
    }
  })"
>
  <div class="pha-c-chart__canvas"></div>
</div>
