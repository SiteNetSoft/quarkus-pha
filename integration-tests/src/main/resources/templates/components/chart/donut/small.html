<div
  class="pha-c-chart"
  id="ch-donut-small"
  x-data="phaChart({
    option: {
      tooltip: { trigger: 'item' },
      series: [{
        name: 'Pets',
        type: 'pie',
        radius: ['62%', '88%'],
        avoidLabelOverlap: false,
        label: {
          show: true, position: 'center',
          formatter: '{|{value|100}\n{label|Pets}|}',
          rich: {
            value: { fontSize: 22, fontWeight: 700, color: '#151515' },
            label: { fontSize: 11, color: '#6a6e73', padding: [4, 0, 0, 0] }
          }
        },
        labelLine: { show: false },
        data: [
          { value: 55, name: 'Cats' },
          { value: 35, name: 'Dogs' },
          { value: 10, name: 'Birds' }
        ]
      }]
    }
  })"
>
  <div class="pha-c-chart__canvas" style="height: 180px; max-width: 180px; margin: 0 auto"></div>
</div>
