<div x-data="{ open: false }" id="dd-descriptions" style="position: relative; display: inline-block">
  <button class="pf-v6-c-menu-toggle" type="button" :class="open ? 'pf-m-expanded' : ''" :aria-expanded="open" @click="open = !open">
    <span class="pf-v6-c-menu-toggle__text">Dropdown</span>
    <span class="pf-v6-c-menu-toggle__controls"><span class="pf-v6-c-menu-toggle__toggle-icon">{icons:svg('fa:caret-down').raw}</span></span>
  </button>
  <div class="pf-v6-c-menu" x-show="open" x-cloak @click.outside="open = false" style="position: absolute; top: 100%; left: 0; z-index: 200; min-width: 14rem">
    <div class="pf-v6-c-menu__content">
      <ul class="pf-v6-c-menu__list" role="menu">
        <li role="none" class="pf-v6-c-menu__list-item"><button class="pf-v6-c-menu__item" type="button" role="menuitem" @click="open = false"><span class="pf-v6-c-menu__item-main"><span class="pf-v6-c-menu__item-text">Edit</span><span class="pf-v6-c-menu__item-description">Change the resource name or labels</span></span></button></li>
        <li role="none" class="pf-v6-c-menu__list-item pf-m-danger"><button class="pf-v6-c-menu__item" type="button" role="menuitem" @click="open = false"><span class="pf-v6-c-menu__item-main"><span class="pf-v6-c-menu__item-text">Delete</span><span class="pf-v6-c-menu__item-description">Permanently remove the resource</span></span></button></li>
      </ul>
    </div>
  </div>
</div>
