<div style="display: flex; height: 260px; border: 1px solid var(--pf-t--global--border--color--default)">
<div class="pf-v6-c-toolbar pf-m-vertical" id="tb-vertical">
  <div class="pf-v6-c-toolbar__content">
    <div class="pf-v6-c-toolbar__content-section">
        <div class="pf-v6-c-toolbar__item">
          <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Grid view"><span class="pf-v6-c-button__icon">{icons:svg('fa:table-cells-large').raw}</span></button>
        </div>
        <div class="pf-v6-c-toolbar__item">
          <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Filter"><span class="pf-v6-c-button__icon">{icons:svg('fa:filter').raw}</span></button>
        </div>
        <div class="pf-v6-c-toolbar__item">
          <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Settings"><span class="pf-v6-c-button__icon">{icons:svg('fa:gear').raw}</span></button>
        </div>
    </div>
  </div>
</div>
  <div style="padding: 1rem">Content beside the vertical toolbar.</div>
</div>
