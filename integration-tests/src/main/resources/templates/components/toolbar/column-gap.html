{! Adjusted group column gap — pf-m-column-gap-[none/sm/md/lg] on toolbar groups. !}
<div class="pf-v6-c-toolbar" id="tb-column-gap">
  <div class="pf-v6-c-toolbar__content">
    <div class="pf-v6-c-toolbar__content-section">
      <div class="pf-v6-c-toolbar__group pf-m-column-gap-lg">
        <div class="pf-v6-c-toolbar__item">Large gap</div>
        <div class="pf-v6-c-toolbar__item">Item</div>
      </div>
      <hr class="pf-v6-c-divider pf-m-vertical" />
      <div class="pf-v6-c-toolbar__group pf-m-column-gap-sm">
        <div class="pf-v6-c-toolbar__item">Small gap</div>
        <div class="pf-v6-c-toolbar__item">Item</div>
      </div>
      <hr class="pf-v6-c-divider pf-m-vertical" />
      <div class="pf-v6-c-toolbar__group pf-m-column-gap-none">
        <div class="pf-v6-c-toolbar__item">No gap</div>
        <div class="pf-v6-c-toolbar__item">Item</div>
      </div>
    </div>
  </div>
</div>
