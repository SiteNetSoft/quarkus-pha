{! Hover or focus the trigger — the tooltip appears above it (PF default position, 300ms delay). !}
<div style="padding: 3.5rem; text-align: center">
  {#include components/feedback/tooltip id="tt-basic" position="top"}
  {#trigger}<button class="pf-v6-c-button pf-m-secondary" type="button"><span class="pf-v6-c-button__text">Hover or focus me</span></button>{/trigger}
  {#tip}I'm a tooltip{/tip}
  {/include}
</div>
