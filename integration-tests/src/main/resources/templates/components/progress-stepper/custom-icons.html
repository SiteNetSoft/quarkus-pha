<ol class="pf-v6-c-progress-stepper" id="ps-custom-icons" role="list" aria-label="Progress steps">
<li class="pf-v6-c-progress-stepper__step pf-m-custom">
  <div class="pf-v6-c-progress-stepper__step-connector">
    <span class="pf-v6-c-progress-stepper__step-icon">{icons:svg('fa:code').raw}</span>
  </div>
  <div class="pf-v6-c-progress-stepper__step-main">
    <div class="pf-v6-c-progress-stepper__step-title">Code</div>
    <div class="pf-v6-c-progress-stepper__step-description">Pushed to main</div>
  </div>
</li>
<li class="pf-v6-c-progress-stepper__step pf-m-custom" aria-current="step">
  <div class="pf-v6-c-progress-stepper__step-connector">
    <span class="pf-v6-c-progress-stepper__step-icon">{icons:svg('fa:cube').raw}</span>
  </div>
  <div class="pf-v6-c-progress-stepper__step-main">
    <div class="pf-v6-c-progress-stepper__step-title">Build</div>
    <div class="pf-v6-c-progress-stepper__step-description">Image built</div>
  </div>
</li>
<li class="pf-v6-c-progress-stepper__step pf-m-pending">
  <div class="pf-v6-c-progress-stepper__step-connector">
    <span class="pf-v6-c-progress-stepper__step-icon">{icons:svg('fa:rocket').raw}</span>
  </div>
  <div class="pf-v6-c-progress-stepper__step-main">
    <div class="pf-v6-c-progress-stepper__step-title">Ship</div>
    <div class="pf-v6-c-progress-stepper__step-description">Awaiting approval</div>
  </div>
</li>
</ol>
