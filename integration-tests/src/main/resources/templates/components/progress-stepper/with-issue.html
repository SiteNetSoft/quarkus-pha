<ol class="pf-v6-c-progress-stepper" id="ps-issue" role="list" aria-label="Progress steps">
<li class="pf-v6-c-progress-stepper__step pf-m-success">
  <div class="pf-v6-c-progress-stepper__step-connector">
    <span class="pf-v6-c-progress-stepper__step-icon">{icons:svg('fa:circle-check').raw}</span>
  </div>
  <div class="pf-v6-c-progress-stepper__step-main">
    <div class="pf-v6-c-progress-stepper__step-title">Built</div>
  </div>
</li>
<li class="pf-v6-c-progress-stepper__step pf-m-warning">
  <div class="pf-v6-c-progress-stepper__step-connector">
    <span class="pf-v6-c-progress-stepper__step-icon">{icons:svg('fa:exclamation-triangle').raw}</span>
  </div>
  <div class="pf-v6-c-progress-stepper__step-main">
    <div class="pf-v6-c-progress-stepper__step-title">Tests passed with warnings</div>
  </div>
</li>
<li class="pf-v6-c-progress-stepper__step pf-m-current" aria-current="step">
  <div class="pf-v6-c-progress-stepper__step-connector">
    <span class="pf-v6-c-progress-stepper__step-icon"></span>
  </div>
  <div class="pf-v6-c-progress-stepper__step-main">
    <div class="pf-v6-c-progress-stepper__step-title">Deploying</div>
  </div>
</li>
<li class="pf-v6-c-progress-stepper__step">
  <div class="pf-v6-c-progress-stepper__step-connector">
    <span class="pf-v6-c-progress-stepper__step-icon"></span>
  </div>
  <div class="pf-v6-c-progress-stepper__step-main">
    <div class="pf-v6-c-progress-stepper__step-title">Released</div>
  </div>
</li>
</ol>
