{! Simple launcher: a vertical list of text items with leading icons (no grid). !}
<div x-data="{ open: false }" style="position: relative; display: inline-block">
  <button class="pf-v6-c-menu-toggle pf-m-plain" type="button" :class="open ? 'pf-m-expanded' : ''" :aria-expanded="open" @click="open = !open" aria-label="Application launcher" id="al-text-toggle">
    <span class="pf-v6-c-menu-toggle__icon">{icons:svg('fa:table-cells-large').raw}</span>
  </button>
  <div class="pf-v6-c-menu pf-m-plain" x-show="open" x-cloak @click.outside="open = false" style="position: absolute; top: 100%; left: 0; z-index: 200; min-width: 14rem">
    <div class="pf-v6-c-menu__content">
      <ul class="pf-v6-c-menu__list">
        <li class="pf-v6-c-menu__list-item">
          <a href="#" class="pf-v6-c-menu__item">
            <span class="pf-v6-c-menu__item-main">
              <span class="pf-v6-c-menu__item-icon">{icons:svg('fa:chart-line').raw}</span>
              <span class="pf-v6-c-menu__item-text">Analytics</span>
            </span>
          </a>
        </li>
        <li class="pf-v6-c-menu__list-item">
          <a href="#" class="pf-v6-c-menu__item">
            <span class="pf-v6-c-menu__item-main">
              <span class="pf-v6-c-menu__item-icon">{icons:svg('fa:folder').raw}</span>
              <span class="pf-v6-c-menu__item-text">Files</span>
            </span>
          </a>
        </li>
        <li class="pf-v6-c-menu__list-item">
          <a href="#" class="pf-v6-c-menu__item">
            <span class="pf-v6-c-menu__item-main">
              <span class="pf-v6-c-menu__item-icon">{icons:svg('fa:envelope').raw}</span>
              <span class="pf-v6-c-menu__item-text">Mail</span>
            </span>
          </a>
        </li>
        <li class="pf-v6-c-menu__list-item">
          <a href="#" class="pf-v6-c-menu__item">
            <span class="pf-v6-c-menu__item-main">
              <span class="pf-v6-c-menu__item-icon">{icons:svg('fa:gear').raw}</span>
              <span class="pf-v6-c-menu__item-text">Settings</span>
            </span>
          </a>
        </li>
      </ul>
    </div>
  </div>
</div>
