{! Form groups laid out on the PF grid — two columns from md up. !}
<form class="pf-v6-c-form" id="form-grid" novalidate>
  <div class="pf-v6-l-grid pf-m-gutter">
    <div class="pf-v6-l-grid__item pf-m-6-col-on-md">
      <div class="pf-v6-c-form__group">
        <div class="pf-v6-c-form__group-label">
          <label class="pf-v6-c-form__label" for="form-grid-first"><span class="pf-v6-c-form__label-text">First name</span></label>
        </div>
        <div class="pf-v6-c-form__group-control"><span class="pf-v6-c-form-control"><input type="text" id="form-grid-first" /></span></div>
      </div>
    </div>
    <div class="pf-v6-l-grid__item pf-m-6-col-on-md">
      <div class="pf-v6-c-form__group">
        <div class="pf-v6-c-form__group-label">
          <label class="pf-v6-c-form__label" for="form-grid-last"><span class="pf-v6-c-form__label-text">Last name</span></label>
        </div>
        <div class="pf-v6-c-form__group-control"><span class="pf-v6-c-form-control"><input type="text" id="form-grid-last" /></span></div>
      </div>
    </div>
    <div class="pf-v6-l-grid__item pf-m-12-col">
      <div class="pf-v6-c-form__group">
        <div class="pf-v6-c-form__group-label">
          <label class="pf-v6-c-form__label" for="form-grid-email"><span class="pf-v6-c-form__label-text">Email</span></label>
        </div>
        <div class="pf-v6-c-form__group-control"><span class="pf-v6-c-form-control"><input type="email" id="form-grid-email" /></span></div>
      </div>
    </div>
  </div>
</form>
