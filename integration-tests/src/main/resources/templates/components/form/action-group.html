{! The canonical submit/cancel action row (pf-v6-c-form__group pf-m-action + __actions). !}
<form class="pf-v6-c-form" novalidate @submit.prevent id="form-action-group">
  <div class="pf-v6-c-form__group">
    <div class="pf-v6-c-form__group-label">
      <label class="pf-v6-c-form__label" for="fag-name">
        <span class="pf-v6-c-form__label-text">Name</span>
      </label>
    </div>
    <div class="pf-v6-c-form__group-control">
      <span class="pf-v6-c-form-control"><input type="text" id="fag-name" aria-label="Name" /></span>
    </div>
  </div>
  <div class="pf-v6-c-form__group pf-m-action">
    <div class="pf-v6-c-form__actions">
      <button class="pf-v6-c-button pf-m-primary" type="submit"><span class="pf-v6-c-button__text">Submit</span></button>
      <button class="pf-v6-c-button pf-m-link" type="button"><span class="pf-v6-c-button__text">Cancel</span></button>
    </div>
  </div>
</form>
