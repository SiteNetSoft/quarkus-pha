{! Options menu = Dropdown with a single-select group inside; chosen item gets a checkmark. !}
<div x-data="{ open: false, choice: 'Newest' }" style="position: relative; display: inline-block">
  <button class="pf-v6-c-menu-toggle" type="button" :class="open ? 'pf-m-expanded' : ''" :aria-expanded="open" @click="open = !open" id="om-basic-toggle">
    <span class="pf-v6-c-menu-toggle__text">Sort by: <span x-text="choice"></span></span>
    <span class="pf-v6-c-menu-toggle__controls"><span class="pf-v6-c-menu-toggle__toggle-icon">{icons:svg('fa:caret-down').raw}</span></span>
  </button>
  <div class="pf-v6-c-menu" x-show="open" x-cloak @click.outside="open = false" style="position: absolute; top: 100%; left: 0; z-index: 200; min-width: 14rem">
    <div class="pf-v6-c-menu__content">
      <ul class="pf-v6-c-menu__list" role="menu">
        <template x-for="opt in ['Newest', 'Oldest', 'Name A→Z', 'Name Z→A']" :key="opt">
          <li class="pf-v6-c-menu__list-item" :class="choice === opt ? 'pf-m-selected' : ''"><button class="pf-v6-c-menu__item" type="button" role="menuitemradio" :aria-checked="choice === opt" @click="choice = opt; open = false">
            <span class="pf-v6-c-menu__item-main">
              <span class="pf-v6-c-menu__item-text" x-text="opt"></span>
              <span class="pf-v6-c-menu__item-select-icon" x-show="choice === opt">{icons:svg('fa:check').raw}</span>
            </span>
          </button></li>
        </template>
      </ul>
    </div>
  </div>
</div>
