<div x-data="{ active: 'n1' }">
  {#include components/navigation/tabs id="tabs-nav" nav=true ariaLabel="Tabs linked to nav elements"}{#content}
  <li class="pf-v6-c-tabs__item" :class="active === 'n1' ? 'pf-m-current' : ''">
    <a href="#" class="pf-v6-c-tabs__link" :aria-current="active === 'n1' ? 'page' : false" @click.prevent="active = 'n1'">
      <span class="pf-v6-c-tabs__item-text">Cluster overview</span>
    </a>
  </li>
  <li class="pf-v6-c-tabs__item" :class="active === 'n2' ? 'pf-m-current' : ''">
    <a href="#" class="pf-v6-c-tabs__link" :aria-current="active === 'n2' ? 'page' : false" @click.prevent="active = 'n2'">
      <span class="pf-v6-c-tabs__item-text">Nodes</span>
    </a>
  </li>
  <li class="pf-v6-c-tabs__item" :class="active === 'n3' ? 'pf-m-current' : ''">
    <a href="#" class="pf-v6-c-tabs__link" :aria-current="active === 'n3' ? 'page' : false" @click.prevent="active = 'n3'">
      <span class="pf-v6-c-tabs__item-text">Workloads</span>
    </a>
  </li>
  {/content}{/include}
  <section class="pf-v6-c-tab-content" role="tabpanel" x-show="active === 'n1'" x-cloak>
    <div class="pf-v6-c-tab-content__body">Cluster overview panel</div>
  </section>
  <section class="pf-v6-c-tab-content" role="tabpanel" x-show="active === 'n2'" x-cloak>
    <div class="pf-v6-c-tab-content__body">Nodes panel</div>
  </section>
  <section class="pf-v6-c-tab-content" role="tabpanel" x-show="active === 'n3'" x-cloak>
    <div class="pf-v6-c-tab-content__body">Workloads panel</div>
  </section>
</div>
