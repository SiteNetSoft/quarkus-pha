{! pf-m-icons on the root — every action is icon-only, tighter spacing throughout. Use iconList=true on the runtime include to get this. !}
<div class="pf-v6-c-action-list pf-m-icons" id="action-list-icons-list">
  <div class="pf-v6-c-action-list__group">
    <div class="pf-v6-c-action-list__item">
      <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Edit">
        <span class="pf-v6-c-button__icon">{icons:svg('fa:pen-to-square').raw}</span>
      </button>
    </div>
    <div class="pf-v6-c-action-list__item">
      <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Clone">
        <span class="pf-v6-c-button__icon">{icons:svg('fa:copy').raw}</span>
      </button>
    </div>
    <div class="pf-v6-c-action-list__item">
      <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Delete">
        <span class="pf-v6-c-button__icon">{icons:svg('fa:trash').raw}</span>
      </button>
    </div>
  </div>
</div>
