{! Two side-by-side groups — typical for wizards: nav buttons on the left, submit/cancel on the right. PF widens the gutter between groups vs. between items, so the visual split is automatic. !}
<div class="pf-v6-c-action-list" id="action-list-multiple-groups">
  <div class="pf-v6-c-action-list__group">
    <div class="pf-v6-c-action-list__item">
      <button class="pf-v6-c-button pf-m-primary" type="button">
        <span class="pf-v6-c-button__text">Next</span>
      </button>
    </div>
    <div class="pf-v6-c-action-list__item">
      <button class="pf-v6-c-button pf-m-secondary" type="button">
        <span class="pf-v6-c-button__text">Back</span>
      </button>
    </div>
  </div>
  <div class="pf-v6-c-action-list__group">
    <div class="pf-v6-c-action-list__item">
      <button class="pf-v6-c-button pf-m-primary" type="button">
        <span class="pf-v6-c-button__text">Submit</span>
      </button>
    </div>
    <div class="pf-v6-c-action-list__item">
      <button class="pf-v6-c-button pf-m-link" type="button">
        <span class="pf-v6-c-button__text">Cancel</span>
      </button>
    </div>
  </div>
</div>
