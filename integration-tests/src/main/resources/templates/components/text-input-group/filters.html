{! Applied filters as labels inside the input group's main area. !}
<div class="pf-v6-c-text-input-group" id="tig-filters" x-data="{ filters: ['Bravo', 'Charlie'], q: '' }" style="max-width: 420px">
  <div class="pf-v6-c-text-input-group__main">
    <div class="pf-v6-c-text-input-group__group">
      <div class="pf-v6-c-label-group">
        <div class="pf-v6-c-label-group__main">
          <ul class="pf-v6-c-label-group__list" role="list" aria-label="Applied filters">
            <template x-for="f in filters" :key="f">
              <li class="pf-v6-c-label-group__list-item">
                <span class="pf-v6-c-label pf-m-outline">
                  <span class="pf-v6-c-label__content"><span class="pf-v6-c-label__text" x-text="f"></span></span>
                  <span class="pf-v6-c-label__actions">
                    <button class="pf-v6-c-button pf-m-plain" type="button" :aria-label="'Remove ' + f" @click="filters = filters.filter((x) => x !== f)">
                      <span class="pf-v6-c-button__icon">{icons:svg('fa:xmark').raw}</span>
                    </button>
                  </span>
                </span>
              </li>
            </template>
          </ul>
        </div>
      </div>
    </div>
    <span class="pf-v6-c-text-input-group__text">
      <input class="pf-v6-c-text-input-group__text-input" type="text" x-model="q" placeholder="Add filter" aria-label="Add filter" @keydown.enter="if (q.trim() !== '') { filters.push(q.trim()); q = '' }" />
    </span>
  </div>
  <div class="pf-v6-c-text-input-group__utilities" x-show="filters.length > 0 || q !== ''">
    <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Clear all" @click="filters = []; q = ''">
      <span class="pf-v6-c-button__icon">{icons:svg('fa:xmark').raw}</span>
    </button>
  </div>
</div>
