<div style="display: flex; flex-direction: column; gap: 0.5rem; max-width: 360px">
  <div class="pf-v6-c-text-input-group pf-m-success" id="tig-status-success">
    <div class="pf-v6-c-text-input-group__main">
      <span class="pf-v6-c-text-input-group__text">
        <input class="pf-v6-c-text-input-group__text-input" type="text" value="Valid value" aria-label="Success input" />
        <span class="pf-v6-c-text-input-group__icon pf-m-status">{icons:svg('fa:circle-check').raw}</span>
      </span>
    </div>
  </div>
  <div class="pf-v6-c-text-input-group pf-m-error" id="tig-status-error">
    <div class="pf-v6-c-text-input-group__main">
      <span class="pf-v6-c-text-input-group__text">
        <input class="pf-v6-c-text-input-group__text-input" type="text" value="Invalid value" aria-label="Error input" aria-invalid="true" />
        <span class="pf-v6-c-text-input-group__icon pf-m-status">{icons:svg('fa:circle-exclamation').raw}</span>
      </span>
    </div>
  </div>
</div>
