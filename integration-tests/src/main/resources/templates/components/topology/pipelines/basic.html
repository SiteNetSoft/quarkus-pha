<div
  class="pha-c-topology"
  id="cy-pipelines"
  role="img"
  aria-label="CI pipeline rendered left-to-right with status colours per stage"
  x-data="phaTopology({
    elements: [
      { data: { id: 'checkout', label: 'checkout', state: 'ok' } },
      { data: { id: 'lint',     label: 'lint',     state: 'ok' } },
      { data: { id: 'test',     label: 'test',     state: 'ok' } },
      { data: { id: 'build',    label: 'build',    state: 'ok' } },
      { data: { id: 'security', label: 'security', state: 'warn' } },
      { data: { id: 'stage',    label: 'stage',    state: 'running' } },
      { data: { id: 'prod',     label: 'prod',     state: 'pending' } },
      { data: { source: 'checkout', target: 'lint'     } },
      { data: { source: 'lint',     target: 'test'     } },
      { data: { source: 'test',     target: 'build'    } },
      { data: { source: 'build',    target: 'security' } },
      { data: { source: 'security', target: 'stage'    } },
      { data: { source: 'stage',    target: 'prod'     } }
    ],
    layout: {
      name: 'breadthfirst', directed: true, animate: false,
      padding: 30, spacingFactor: 1.3, transform: (node, pos) => ({ x: pos.y * 1.4, y: pos.x })
    },
    style: [
      { selector: 'node', style: {
        'label': 'data(label)', 'color': '#fff',
        'text-valign': 'center', 'text-halign': 'center',
        'font-size': 12, 'font-family': 'RedHatText, Helvetica, Arial, sans-serif',
        'width': 90, 'height': 42, 'shape': 'round-rectangle',
        'border-width': 2
      } },
      { selector: 'node[state=\"ok\"]',      style: { 'background-color': '#4cb140', 'border-color': '#1e4f18' } },
      { selector: 'node[state=\"warn\"]',    style: { 'background-color': '#ec7a08', 'border-color': '#7d3f00' } },
      { selector: 'node[state=\"running\"]', style: { 'background-color': '#06c',    'border-color': '#003366' } },
      { selector: 'node[state=\"pending\"]', style: { 'background-color': '#8a8d90', 'border-color': '#3c3f42' } },
      { selector: 'edge', style: {
        'width': 2, 'line-color': '#8a8d90',
        'target-arrow-color': '#8a8d90', 'target-arrow-shape': 'triangle',
        'curve-style': 'taxi', 'taxi-direction': 'horizontal'
      } }
    ]
  })"
>
  <div class="pha-c-topology__canvas"></div>
</div>
