{! Any file format — the preview is custom content instead of a textarea. !}
<div class="pf-v6-c-file-upload" id="sfu-preview" x-data="{ name: '', content: '', size: 0, read(e) { var f = e.target.files[0]; if (!f) return; this.name = f.name; this.size = f.size } }" style="max-width: 480px">
  <input type="file" x-ref="file" style="display: none" aria-hidden="true" tabindex="-1" @change="read($event)" />
  <div class="pf-v6-c-file-upload__file-select"><div class="pf-v6-c-input-group"><div class="pf-v6-c-input-group__item pf-m-fill"><span class="pf-v6-c-form-control pf-m-readonly">
      <input type="text" id="sfu-preview-filename" readonly placeholder="No file chosen" aria-label="File name" x-model="name" />
    </span></div><div class="pf-v6-c-input-group__item"><button class="pf-v6-c-button pf-m-control" type="button" @click="$refs.file.click()"><span class="pf-v6-c-button__text">Browse...</span></button></div><div class="pf-v6-c-input-group__item"><button class="pf-v6-c-button pf-m-control" type="button" :disabled="name === ''" @click="name = ''; content = ''; $refs.file.value = ''"><span class="pf-v6-c-button__text">Clear</span></button></div></div></div><div class="pf-v6-c-file-upload__file-details" x-show="name !== ''" x-cloak>
    <div class="pf-v6-l-flex pf-m-space-items-sm pf-m-align-items-center" style="padding: 1rem">
      <span class="pf-v6-c-icon pf-m-lg"><span class="pf-v6-c-icon__content">{icons:svg('fa:file').raw}</span></span>
      <div>
        <strong x-text="name"></strong>
        <div class="pf-v6-u-color-200"><span x-text="size"></span> bytes</div>
      </div>
    </div>
  </div>
</div>
