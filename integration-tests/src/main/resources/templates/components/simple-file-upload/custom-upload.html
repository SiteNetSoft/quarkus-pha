{! Bring your own browse logic — here a link button (not the control button) opens the dialog. !}
<div class="pf-v6-c-file-upload" id="sfu-custom" x-data="{ name: '', content: '', read(e) { var f = e.target.files[0]; if (!f) return; this.name = f.name; var d = this; var r = new FileReader(); r.onload = function (ev) { d.content = ev.target.result }; r.readAsText(f) } }" style="max-width: 480px">
  <input type="file" x-ref="file" style="display: none" aria-hidden="true" tabindex="-1" @change="read($event)" />
  <div class="pf-v6-c-file-upload__file-select"><div class="pf-v6-c-input-group"><div class="pf-v6-c-input-group__item pf-m-fill"><span class="pf-v6-c-form-control pf-m-readonly">
      <input type="text" id="sfu-custom-filename" readonly placeholder="No file chosen" aria-label="File name" x-model="name" />
    </span></div><div class="pf-v6-c-input-group__item"><button class="pf-v6-c-button pf-m-link" type="button" @click="$refs.file.click()">
      <span class="pf-v6-c-button__icon pf-m-start">{icons:svg('fa:cloud-arrow-up').raw}</span>
      <span class="pf-v6-c-button__text">Upload a file</span>
    </button></div><div class="pf-v6-c-input-group__item"><button class="pf-v6-c-button pf-m-control" type="button" :disabled="name === ''" @click="name = ''; content = ''; $refs.file.value = ''"><span class="pf-v6-c-button__text">Clear</span></button></div></div></div><div class="pf-v6-c-file-upload__file-details">
    <span class="pf-v6-c-form-control pf-m-textarea pf-m-resize-vertical">
      <textarea id="sfu-custom-details" rows="4" aria-label="File contents" x-model="content" readonly placeholder="File preview"></textarea>
    </span>
  </div>
</div>
