{#include components/data-display/table id="tbl-sortable" ariaLabel="Sortable table example"} {#content}
<thead>
  <tr>
    <th scope="col" class="pf-v6-c-table__sort pf-m-selected" aria-sort="ascending">
      <button
        type="button"
        class="pf-v6-c-table__button"
        hx-get="/api/htmx/table-sort?col=name&amp;dir=desc"
        hx-target="#tbl-sortable"
        hx-swap="outerHTML"
      >
        <span class="pf-v6-c-table__button-content">
          <span class="pf-v6-c-table__text">Name</span>
          <span class="pf-v6-c-table__sort-indicator"><i class="fas fa-long-arrow-alt-up" aria-hidden="true"></i></span>
        </span>
      </button>
    </th>
    <th scope="col" class="pf-v6-c-table__sort" aria-sort="none">
      <button
        type="button"
        class="pf-v6-c-table__button"
        hx-get="/api/htmx/table-sort?col=role&amp;dir=asc"
        hx-target="#tbl-sortable"
        hx-swap="outerHTML"
      >
        <span class="pf-v6-c-table__button-content">
          <span class="pf-v6-c-table__text">Role</span>
          <span class="pf-v6-c-table__sort-indicator"><i class="fas fa-arrows-alt-v" aria-hidden="true"></i></span>
        </span>
      </button>
    </th>
    <th scope="col" class="pf-v6-c-table__sort" aria-sort="none">
      <button
        type="button"
        class="pf-v6-c-table__button"
        hx-get="/api/htmx/table-sort?col=region&amp;dir=asc"
        hx-target="#tbl-sortable"
        hx-swap="outerHTML"
      >
        <span class="pf-v6-c-table__button-content">
          <span class="pf-v6-c-table__text">Region</span>
          <span class="pf-v6-c-table__sort-indicator"><i class="fas fa-arrows-alt-v" aria-hidden="true"></i></span>
        </span>
      </button>
    </th>
  </tr>
</thead>
<tbody>
  <tr>
    <td>Alice Chen</td>
    <td>Admin</td>
    <td>us-east-1</td>
  </tr>
  <tr>
    <td>Bob Johnson</td>
    <td>Viewer</td>
    <td>eu-west-1</td>
  </tr>
  <tr>
    <td>Diego Ramos</td>
    <td>Viewer</td>
    <td>ap-southeast-1</td>
  </tr>
  <tr>
    <td>Jane Smith</td>
    <td>Editor</td>
    <td>eu-west-1</td>
  </tr>
  <tr>
    <td>John Doe</td>
    <td>Admin</td>
    <td>us-west-2</td>
  </tr>
</tbody>
{/content} {/include}
