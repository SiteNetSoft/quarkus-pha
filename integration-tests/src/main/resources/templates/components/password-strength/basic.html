{! Password strength meter — input + 4-bucket strength bar. Alpine scores via length + character classes. !}
<div style="max-width: 480px" x-data="{
  pwd: '',
  score() {
    let s = 0;
    if (this.pwd.length >= 8) s++;
    if (/[A-Z]/.test(this.pwd)) s++;
    if (/[0-9]/.test(this.pwd)) s++;
    if (/[^A-Za-z0-9]/.test(this.pwd)) s++;
    return s;
  },
  label() {
    return ['Too short', 'Weak', 'Fair', 'Good', 'Strong'][this.score()];
  },
  color() {
    return ['#aaa', 'var(--pf-t--global--color--status--danger--default)', 'var(--pf-t--global--color--status--warning--default)', 'var(--pf-t--global--color--status--info--default)', 'var(--pf-t--global--color--status--success--default)'][this.score()];
  }
}">
  <label class="pf-v6-c-form__label" for="ps-basic-input"><span class="pf-v6-c-form__label-text">Password</span></label>
  <span class="pf-v6-c-form-control" style="display: block; margin-top: 0.25rem"><input type="password" id="ps-basic-input" x-model="pwd" autocomplete="new-password"></span>
  <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: 0.5rem">
    <template x-for="i in 4" :key="i">
      <div style="height: 6px; border-radius: 2px; background: #ddd" :style="i <= score() ? 'background: ' + color() : ''"></div>
    </template>
  </div>
  <div class="pf-v6-c-form__helper-text" style="margin-top: 0.5rem">
    <div class="pf-v6-c-helper-text">
      <div class="pf-v6-c-helper-text__item">
        <span class="pf-v6-c-helper-text__item-text" x-text="label()"></span>
      </div>
    </div>
  </div>
</div>
