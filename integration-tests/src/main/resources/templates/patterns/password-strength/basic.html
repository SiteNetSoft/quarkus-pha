<div
  x-data="{
    pwd: '',
    rules: {
      length:  () =&gt; this.pwd.length &gt;= 12,
      casing:  () =&gt; /[a-z]/.test(this.pwd) &amp;&amp; /[A-Z]/.test(this.pwd),
      digit:   () =&gt; /[0-9]/.test(this.pwd),
      symbol:  () =&gt; /[^a-zA-Z0-9]/.test(this.pwd)
    },
    score() {
      let s = 0;
      if (this.pwd.length &gt;= 8)  s++;
      if (this.pwd.length &gt;= 12) s++;
      if (/[a-z]/.test(this.pwd) &amp;&amp; /[A-Z]/.test(this.pwd)) s++;
      if (/[0-9]/.test(this.pwd)) s++;
      if (/[^a-zA-Z0-9]/.test(this.pwd)) s++;
      return s;
    }
  }"
  style="max-width: 480px"
>
  <form class="pf-v6-c-form">
    <div class="pf-v6-c-form__group">
      <div class="pf-v6-c-form__group-label">
        <label class="pf-v6-c-form__label" for="pwd-strength-basic"
          ><span class="pf-v6-c-form__label-text">New password</span></label
        >
      </div>
      <div class="pf-v6-c-form__group-control">
        <span class="pf-v6-c-form-control"
          ><input
            type="password"
            id="pwd-strength-basic"
            x-model="pwd"
            autocomplete="new-password"
            aria-describedby="pwd-strength-meter"
        /></span>
      </div>
    </div>
  </form>

  <div style="margin-top: 0.75rem" aria-live="polite">
    <p
      style="margin-bottom: 0.25rem; font-weight: 600"
      x-text="['', 'Very weak', 'Weak', 'Fair', 'Strong', 'Very strong'][score()] || ' '"
    ></p>
    <div
      id="pwd-strength-meter"
      class="pf-v6-c-progress pf-m-singleline"
      role="progressbar"
      :aria-valuenow="score() * 20"
      aria-valuemin="0"
      aria-valuemax="100"
    >
      <div
        class="pf-v6-c-progress__bar"
        :style="'width: ' + (score() * 20) + '%; height: 6px; background: ' + ['#d2d2d2','#c9190b','#ec7a08','#f4c145','#4cb140','#06c'][score()]"
      ></div>
    </div>
    <ul style="margin-top: 0.5rem; list-style: none; padding: 0; font-size: 0.875rem">
      <li :style="pwd.length &gt;= 12 ? 'color:#4cb140' : 'color:#6a6e73'">12+ characters</li>
      <li :style="/[A-Z]/.test(pwd) &amp;&amp; /[a-z]/.test(pwd) ? 'color:#4cb140' : 'color:#6a6e73'">Mixed case</li>
      <li :style="/[0-9]/.test(pwd) ? 'color:#4cb140' : 'color:#6a6e73'">A digit</li>
      <li :style="/[^a-zA-Z0-9]/.test(pwd) ? 'color:#4cb140' : 'color:#6a6e73'">A symbol</li>
    </ul>
  </div>
</div>
