<div
  x-data="{
    pwd: '',
    tipOpen: false,
    score() {
      let s = 0;
      if (this.pwd.length &gt;= 8)  s++;
      if (this.pwd.length &gt;= 12) s++;
      if (/[a-z]/.test(this.pwd) &amp;&amp; /[A-Z]/.test(this.pwd)) s++;
      if (/[0-9]/.test(this.pwd)) s++;
      if (/[^a-zA-Z0-9]/.test(this.pwd)) s++;
      return s;
    }
  }"
  style="max-width: 480px; position: relative"
>
  <form class="pf-v6-c-form">
    <div class="pf-v6-c-form__group">
      <div class="pf-v6-c-form__group-label" style="display: flex; gap: 0.5rem; align-items: center">
        <label class="pf-v6-c-form__label" for="pwd-strength-tip"
          ><span class="pf-v6-c-form__label-text">New password</span></label
        >
        <button
          type="button"
          class="pf-v6-c-button pf-m-plain pf-m-small"
          aria-label="Password rules"
          @mouseenter="tipOpen = true"
          @mouseleave="tipOpen = false"
          @focus="tipOpen = true"
          @blur="tipOpen = false"
        >
          <span class="pf-v6-c-button__text" style="font-weight: 700">?</span>
        </button>
      </div>
      <div class="pf-v6-c-form__group-control">
        <input
          type="password"
          class="pf-v6-c-form-control"
          id="pwd-strength-tip"
          x-model="pwd"
          autocomplete="new-password"
        />
      </div>
    </div>
  </form>

  <div style="margin-top: 0.5rem">
    <div
      class="pf-v6-c-progress pf-m-singleline"
      role="progressbar"
      :aria-valuenow="score() * 20"
      aria-valuemin="0"
      aria-valuemax="100"
      :aria-valuetext="['', 'Very weak', 'Weak', 'Fair', 'Strong', 'Very strong'][score()] || 'empty'"
    >
      <div
        class="pf-v6-c-progress__bar"
        :style="'width: ' + (score() * 20) + '%; height: 6px; background: ' + ['#d2d2d2','#c9190b','#ec7a08','#f4c145','#4cb140','#06c'][score()]"
      ></div>
    </div>
  </div>

  <div
    x-show="tipOpen"
    x-cloak
    role="tooltip"
    style="
      position: absolute;
      top: 1rem;
      left: 100%;
      margin-left: 0.5rem;
      background: #151515;
      color: #fff;
      padding: 0.75rem 1rem;
      border-radius: 4px;
      font-size: 0.875rem;
      max-width: 240px;
      z-index: 5;
    "
  >
    <strong>Password rules</strong>
    <ul style="list-style: disc; margin: 0.5rem 0 0 1rem; padding: 0">
      <li>At least 12 characters</li>
      <li>Upper- and lower-case letters</li>
      <li>At least one digit</li>
      <li>At least one symbol</li>
    </ul>
  </div>
</div>
