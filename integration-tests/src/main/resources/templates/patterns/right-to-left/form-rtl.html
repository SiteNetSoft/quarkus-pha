<div
  dir="rtl"
  style="
    max-width: 480px;
    border: 1px solid var(--pf-t--global--border--color--default, #d2d2d2);
    border-radius: 4px;
    padding: 1.25rem;
  "
>
  <h3 class="pf-v6-c-content--h3" lang="ar">إنشاء حساب جديد</h3>
  <form class="pf-v6-c-form" style="margin-top: 1rem">
    <div class="pf-v6-c-form__group">
      <div class="pf-v6-c-form__group-label">
        <label class="pf-v6-c-form__label" for="rtl-name" lang="ar"
          ><span class="pf-v6-c-form__label-text">الاسم الكامل</span></label
        >
      </div>
      <div class="pf-v6-c-form__group-control">
        <span class="pf-v6-c-form-control"><input id="rtl-name" type="text" value="سارة محمود" lang="ar" /></span>
      </div>
    </div>
    <div class="pf-v6-c-form__group">
      <div class="pf-v6-c-form__group-label">
        <label class="pf-v6-c-form__label" for="rtl-email"
          ><span class="pf-v6-c-form__label-text" lang="ar">البريد الإلكتروني</span></label
        >
      </div>
      <div class="pf-v6-c-form__group-control">
        <span class="pf-v6-c-form-control"
          ><input id="rtl-email" type="email" value="sara@example.com" dir="ltr"
        /></span>
      </div>
    </div>
    <div class="pf-v6-c-form__group">
      <div class="pf-v6-c-form__group-label">
        <label class="pf-v6-c-form__label" for="rtl-region" lang="ar"
          ><span class="pf-v6-c-form__label-text">المنطقة</span></label
        >
      </div>
      <div class="pf-v6-c-form__group-control">
        <span class="pf-v6-c-form-control"
          ><select id="rtl-region" lang="ar">
            <option>الشرق الأوسط</option>
            <option>أوروبا</option>
            <option>أمريكا الشمالية</option></select
          ><span class="pf-v6-c-form-control__utilities"
            ><span class="pf-v6-c-form-control__toggle-icon">{icons:svg('fa:caret-down').raw}</span></span
          ></span
        >
      </div>
    </div>
    <div class="pf-v6-c-form__group">
      <div class="pf-v6-c-form__group-control" style="display: flex; gap: 0.5rem">
        <button type="button" class="pf-v6-c-button pf-m-primary">
          <span class="pf-v6-c-button__text" lang="ar">حفظ</span>
        </button>
        <button type="button" class="pf-v6-c-button pf-m-link">
          <span class="pf-v6-c-button__text" lang="ar">إلغاء</span>
        </button>
      </div>
    </div>
  </form>
</div>
