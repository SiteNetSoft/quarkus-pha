{#include layouts/base}
{#title}Component Showcase{/title}
{#body}
<div class="pf-v6-c-page__main-group">
  <section class="pf-v6-c-page__main-section pf-m-limit-width pf-m-light">
    <div class="pf-v6-c-page__main-body">
      <div data-pf-content="true" class="pf-v6-c-content pf-m-editorial">
        <div class="pf-v6-l-flex pf-m-align-items-center">
          <div>
            <h1 class="pf-v6-c-title pf-m-4xl">All components</h1>
          </div>
        </div>
      </div>
    </div>
  </section>
  <section class="pf-v6-c-page__main-section pf-m-fill pf-m-light-100">
    <div class="pf-v6-c-page__main-body">
      <div class="pf-v6-l-stack pf-m-gutter">
        <div x-data="{ search: '' }">
          <div class="pf-v6-c-toolbar" style="margin-bottom: 1rem;">
            <div class="pf-v6-c-toolbar__content">
              <div class="pf-v6-c-toolbar__content-section">
                <div class="pf-v6-c-toolbar__item">
                  <div class="pf-v6-c-text-input-group">
                    <div class="pf-v6-c-text-input-group__main pf-m-icon">
                      <span class="pf-v6-c-text-input-group__text">
                        <span class="pf-v6-c-text-input-group__icon">
                          <svg class="pf-v6-svg" viewBox="0 0 512 512" fill="currentColor" aria-hidden="true" role="img" width="1em" height="1em">
                            <path d="M505 442.7L405.3 343c-4.5-4.5-10.6-7-17-7H372c27.6-35.3 44-79.7 44-128C416 93.1 322.9 0 208 0S0 93.1 0 208s93.1 208 208 208c48.3 0 92.7-16.4 128-44v16.3c0 6.4 2.5 12.5 7 17l99.7 99.7c9.4 9.4 24.6 9.4 33.9 0l28.3-28.3c9.4-9.4 9.4-24.6.1-34zM208 336c-70.7 0-128-57.2-128-128 0-70.7 57.2-128 128-128 70.7 0 128 57.2 128 128 0 70.7-57.2 128-128 128z"></path>
                          </svg>
                        </span>
                        <input type="text" class="pf-v6-c-text-input-group__text-input"
                               aria-label="Search input" placeholder="Search components by name"
                               x-model="search">
                      </span>
                    </div>
                  </div>
                </div>
                <div class="pf-v6-c-toolbar__item pf-m-pagination pf-m-align-self-center" style="--pf-v6-c-toolbar__item--MinWidth: max-content;">
                  <small data-pf-content="true" class="pf-v6-c-content--small pf-m-editorial">{components.size} items</small>
                </div>
              </div>
            </div>
          </div>
          <div class="pf-v6-l-gallery pf-m-gutter">
            {#for component in components}
            <div x-show="'{component.name}'.toLowerCase().includes(search.toLowerCase())">
              <a href="{component.href}" style="text-decoration: none; color: inherit;">
                <div id="{component.id}" class="pf-v6-c-card pf-m-clickable">
                  <div class="pf-v6-c-card__header">
                    <div class="pf-v6-c-card__header-main">
                      <div class="pf-v6-c-card__title">
                        <div class="pf-v6-c-card__title-text">{component.name}</div>
                      </div>
                    </div>
                  </div>
                  <div class="pf-v6-c-card__body">
                    <img src="{component.image}" alt="{component.name} illustration" style="width: 100%; height: auto;">
                  </div>
                </div>
              </a>
            </div>
            {/for}
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
{/body}
{/include}
