{! Mixed spans — show how 1-col / 2-col / 6-col / 8-col differ visually. !}
{#include layouts/primitives/grid id="grid-spans" gutter=true}
  {#items}
    <div class="pf-v6-l-grid__item pf-m-1-col" style="padding: 0.5rem; background: var(--pf-t--global--background--color--secondary--default); border: 1px solid var(--pf-t--global--border--color--default); text-align: center">1</div>
    <div class="pf-v6-l-grid__item pf-m-2-col" style="padding: 0.5rem; background: var(--pf-t--global--background--color--secondary--default); border: 1px solid var(--pf-t--global--border--color--default); text-align: center">2</div>
    <div class="pf-v6-l-grid__item pf-m-3-col" style="padding: 0.5rem; background: var(--pf-t--global--background--color--secondary--default); border: 1px solid var(--pf-t--global--border--color--default); text-align: center">3</div>
    <div class="pf-v6-l-grid__item pf-m-6-col" style="padding: 0.5rem; background: var(--pf-t--global--background--color--secondary--default); border: 1px solid var(--pf-t--global--border--color--default); text-align: center">6</div>
    <div class="pf-v6-l-grid__item pf-m-8-col" style="padding: 0.5rem; background: var(--pf-t--global--background--color--secondary--default); border: 1px solid var(--pf-t--global--border--color--default); text-align: center">8</div>
    <div class="pf-v6-l-grid__item pf-m-4-col" style="padding: 0.5rem; background: var(--pf-t--global--background--color--secondary--default); border: 1px solid var(--pf-t--global--border--color--default); text-align: center">4</div>
    <div class="pf-v6-l-grid__item pf-m-12-col" style="padding: 0.5rem; background: var(--pf-t--global--background--color--secondary--default); border: 1px solid var(--pf-t--global--border--color--default); text-align: center">12 — full row</div>
  {/items}
{/include}
