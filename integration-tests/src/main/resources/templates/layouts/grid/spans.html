{! Mixed spans — show how 1-col / 2-col / 6-col / 8-col differ visually. !}
<div class="ws-core-l-grid">
  {#include layouts/primitives/grid id="grid-spans" gutter=true}
    {#items}
      <div class="pf-v6-l-grid__item pf-m-1-col">1</div>
      <div class="pf-v6-l-grid__item pf-m-2-col">2</div>
      <div class="pf-v6-l-grid__item pf-m-3-col">3</div>
      <div class="pf-v6-l-grid__item pf-m-6-col">6</div>
      <div class="pf-v6-l-grid__item pf-m-8-col">8</div>
      <div class="pf-v6-l-grid__item pf-m-4-col">4</div>
      <div class="pf-v6-l-grid__item pf-m-12-col">12 — full row</div>
    {/items}
  {/include}
</div>
