{! pf-m-fill on the body — it stretches to consume remaining height. Requires the container to have a fixed height. !}
<div class="ws-core-l-stack" style="height: 240px">
  {#include layouts/primitives/stack id="stack-fill" gutter=true}
    {#items}
      <div class="pf-v6-l-stack__item">Header (fixed)</div>
      <div class="pf-v6-l-stack__item pf-m-fill">Body — fills remaining height</div>
      <div class="pf-v6-l-stack__item">Footer (fixed)</div>
    {/items}
  {/include}
</div>
